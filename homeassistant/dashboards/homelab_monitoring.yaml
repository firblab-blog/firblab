# =============================================================================
# Homelab Monitoring Dashboard (Mushroom Cards)
# =============================================================================
# Requires: HACS + Mushroom Cards installed.
#
# Entity IDs for Proxmox VM/LXC status come from the Proxmox VE UI integration
# (binary_sensor.firblab_XX_<vm_name>). Node-level CPU/memory/disk come from
# REST sensors in packages/homelab_monitoring.yaml.
#
# Register this dashboard in configuration.yaml:
#   lovelace:
#     mode: storage
#     dashboards:
#       homelab-monitoring:
#         mode: yaml
#         filename: dashboards/homelab_monitoring.yaml
#         title: Homelab
#         icon: mdi:server-network
#         show_in_sidebar: true
# =============================================================================

title: Homelab Monitoring
views:
  # ===========================================================================
  # Tab 1: Infrastructure Overview
  # ===========================================================================
  - title: Infrastructure
    path: infrastructure
    icon: mdi:server
    cards:
      # ----- Vault Cluster -----
      - type: custom:mushroom-title-card
        title: Vault Cluster
        subtitle: >-
          {{ states('sensor.vault_cluster_health') | title }}

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.vault_1_sealed
            name: "Vault-1 (Mac Mini)"
            icon: mdi:shield-check
            icon_color: >-
              {% if is_state('sensor.vault_1_sealed', 'False') %}green
              {% elif is_state('sensor.vault_1_sealed', 'True') %}red
              {% else %}grey{% endif %}
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.vault_2_status
            name: "Vault-2 (VLAN 50)"
            icon: mdi:shield-off-outline
            icon_color: grey
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.vault_3_sealed
            name: "Vault-3 (RPi5)"
            icon: mdi:shield-check
            icon_color: >-
              {% if is_state('sensor.vault_3_sealed', 'False') %}green
              {% elif is_state('sensor.vault_3_sealed', 'True') %}red
              {% else %}grey{% endif %}
            layout: vertical

      # ----- Proxmox Nodes: CPU -----
      - type: custom:mushroom-title-card
        title: Proxmox Nodes

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.firblab_01_cpu
            name: "lab-01"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.firblab_02_cpu
            name: "lab-02"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.firblab_03_cpu
            name: "lab-03"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85
          - type: gauge
            entity: sensor.firblab_04_cpu
            name: "lab-04"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 60
              red: 85

      # ----- Proxmox Nodes: Memory -----
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.firblab_01_memory
            name: "RAM 01"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_02_memory
            name: "RAM 02"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_03_memory
            name: "RAM 03"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_04_memory
            name: "RAM 04"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

      # ----- Proxmox Nodes: Disk -----
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.firblab_01_disk
            name: "Disk 01"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_02_disk
            name: "Disk 02"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_03_disk
            name: "Disk 03"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.firblab_04_disk
            name: "Disk 04"
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

      # ----- Uptime Kuma (Service Status) -----
      - type: custom:mushroom-title-card
        title: Service Status
        subtitle: "Uptime Kuma"

      # NOTE: Entity IDs depend on monitor names in Uptime Kuma.
      # After adding the integration, check Developer Tools > States
      # for sensor.uptime_kuma_* entities and populate this section.
      - type: markdown
        content: >-
          **Add Uptime Kuma entity chips here after integration setup.**

          Check Developer Tools > States for `sensor.uptime_kuma_*` entities.

