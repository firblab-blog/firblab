      # ----- lab-02: Pilot Node -----
      - type: custom:mushroom-title-card
        title: "lab-02"
        subtitle: "N100 · 16GB · Pilot Node"

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: binary_sensor.firblab_02_vault_2
            name: "Vault-2"
            icon: mdi:shield-check
            icon_color: >-
