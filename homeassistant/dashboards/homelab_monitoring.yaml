  # ===========================================================================
  # Tab 3: Network
  # ===========================================================================
  - title: Network
    path: network
    icon: mdi:lan
    cards:
      - type: custom:mushroom-title-card
        title: UniFi Network

      # NOTE: UniFi integration creates entities for devices and clients.
      # After integration setup, populate with actual entity IDs.
      - type: markdown
        content: >-
          **Populate after UniFi Network integration is configured.**

          Check Developer Tools > States for `sensor.unifi_*` and
          `device_tracker.*` entities.

          **Devices:** gw-01 (UDM Pro), switch-01/02/03

          **VLANs:** Default (1), Management (10), Services (20), DMZ (30),
          Storage (40), Security (50), IoT (60)

  # ===========================================================================
  # Tab 4: HA Host
  # ===========================================================================
  # System Monitor entity IDs: sensor.system_monitor_*
  # Load averages are raw values (not percent). CM4 has 4 cores, so load 4.0
  # = fully saturated. Gauge max set to 4.
  # Network in/out are cumulative MiB (total_increasing), not throughput rate.
  # ===========================================================================
  - title: HA Host
    path: ha-host
    icon: mdi:raspberry-pi
    cards:
      - type: custom:mushroom-title-card
        title: Home Assistant Host
        subtitle: "RPi CM4 8GB — lab-11"

      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.system_monitor_load_1_min
            name: "Load (1m)"
            min: 0
            max: 4
            severity:
              green: 0
              yellow: 2
              red: 3
          - type: gauge
            entity: sensor.system_monitor_memory_usage
            name: RAM
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.system_monitor_disk_usage
            name: Disk
            min: 0
            max: 100
            severity:
              green: 0
              yellow: 70
              red: 90

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_load_1_min
            name: "Load 1m"
            icon: mdi:cpu-64-bit
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_load_5_min
            name: "Load 5m"
            icon: mdi:cpu-64-bit
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_load_15_min
            name: "Load 15m"
            icon: mdi:cpu-64-bit
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_last_boot
            name: "Last Boot"
            icon: mdi:clock-outline
            layout: vertical

      - type: custom:mushroom-title-card
        title: Network I/O

      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_network_in_end0
            name: "Total In"
            icon: mdi:download-network
            layout: vertical
          - type: custom:mushroom-entity-card
            entity: sensor.system_monitor_network_out_end0
            name: "Total Out"
            icon: mdi:upload-network
            layout: vertical
