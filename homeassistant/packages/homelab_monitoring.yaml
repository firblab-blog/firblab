# =============================================================================
# Homelab Infrastructure Monitoring Package
# =============================================================================
# YAML-configured sensors for FirbLab infrastructure monitoring.
#
# UI-configured integrations (Proxmox VE, UniFi, Uptime Kuma, System Monitor)
# are stored in .storage/ and cannot be version-controlled here.
#
# --- Vault Health ---
# Vault health sensors poll /v1/sys/health (unauthenticated endpoint).
# Only vault-1 and vault-3 are reachable from VLAN 60 (IoT).
# vault-2 (10.0.50.2, Security VLAN 50) is BLOCKED by zone policy.
#
# The ?standbyok=true&perfstandbyok=true params ensure Vault always returns
# HTTP 200 regardless of seal/standby status. Without them, standby nodes
# return 429/473 which HA treats as sensor errors.
#
# --- Proxmox Node Metrics ---
# The HA Proxmox VE integration only provides VM/LXC running status (binary
# sensors), NOT node-level CPU/memory/disk. We supplement with REST sensors
# polling the Proxmox API directly using an API token.
#
# API token: homeassistant@pam!ha-readonly-token (PVEAuditor, read-only)
# Stored in secrets.yaml as proxmox_api_auth header value.
#
# --- SSL ---
# verify_ssl: false because both Vault and Proxmox use internal CAs that
# HAOS cannot easily trust. Endpoints return only monitoring data.
# =============================================================================

rest:
  # ===========================================================================
  # Vault Health Sensors
  # ===========================================================================

  # ---- Vault-1 (Mac Mini M4, 10.0.10.10, Management VLAN 10) ----
  - resource: "https://10.0.10.10:8200/v1/sys/health?standbyok=true&perfstandbyok=true"
    scan_interval: 60
    verify_ssl: false
    sensor:
      - name: "Vault 1 Sealed"
        value_template: "{{ value_json.sealed }}"
        json_attributes:
          - initialized
          - sealed
          - standby
          - performance_standby
          - cluster_name
          - version
      - name: "Vault 1 Version"
        value_template: "{{ value_json.version }}"

  # ---- Vault-3 (RPi5 CM5, 10.0.10.13, Management VLAN 10) ----
  - resource: "https://10.0.10.13:8200/v1/sys/health?standbyok=true&perfstandbyok=true"
    scan_interval: 60
    verify_ssl: false
    sensor:
      - name: "Vault 3 Sealed"
        value_template: "{{ value_json.sealed }}"
        json_attributes:
          - initialized
          - sealed
          - standby
          - performance_standby
          - cluster_name
          - version
      - name: "Vault 3 Version"
        value_template: "{{ value_json.version }}"

  # ===========================================================================
  # Proxmox Node Metrics (REST API)
  # ===========================================================================
  # Polls /api2/json/nodes/<node>/status for CPU, memory, disk.
  # The HA Proxmox VE UI integration only gives VM/LXC running status.
  # ===========================================================================

  # ---- lab-01 (i9-12900K, 64GB, 10.0.10.42) ----
  - resource: "https://10.0.10.42:8006/api2/json/nodes/lab-01/status"
    scan_interval: 30
    verify_ssl: false
    headers:
      Authorization: !secret proxmox_api_auth
    sensor:
      - name: "lab-01 CPU"
        value_template: "{{ (value_json.data.cpu * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:cpu-64-bit
      - name: "lab-01 Memory"
        value_template: "{{ ((value_json.data.memory.used / value_json.data.memory.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:memory
      - name: "lab-01 Disk"
        value_template: "{{ ((value_json.data.rootfs.used / value_json.data.rootfs.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:harddisk
      - name: "lab-01 Uptime"
        value_template: "{{ (value_json.data.uptime / 86400) | round(1) }}"
        unit_of_measurement: "days"
        icon: mdi:clock-outline

  # ---- lab-02 (Intel N100, 16GB, 10.0.10.2) ----
  - resource: "https://10.0.10.2:8006/api2/json/nodes/lab-02/status"
    scan_interval: 30
    verify_ssl: false
    headers:
      Authorization: !secret proxmox_api_auth
    sensor:
      - name: "lab-02 CPU"
        value_template: "{{ (value_json.data.cpu * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:cpu-64-bit
      - name: "lab-02 Memory"
        value_template: "{{ ((value_json.data.memory.used / value_json.data.memory.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:memory
      - name: "lab-02 Disk"
        value_template: "{{ ((value_json.data.rootfs.used / value_json.data.rootfs.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:harddisk
      - name: "lab-02 Uptime"
        value_template: "{{ (value_json.data.uptime / 86400) | round(1) }}"
        unit_of_measurement: "days"
        icon: mdi:clock-outline

  # ---- lab-03 (Intel N100, 12GB, 10.0.10.3) ----
  - resource: "https://10.0.10.3:8006/api2/json/nodes/lab-03/status"
    scan_interval: 30
    verify_ssl: false
    headers:
      Authorization: !secret proxmox_api_auth
    sensor:
      - name: "lab-03 CPU"
        value_template: "{{ (value_json.data.cpu * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:cpu-64-bit
      - name: "lab-03 Memory"
        value_template: "{{ ((value_json.data.memory.used / value_json.data.memory.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:memory
      - name: "lab-03 Disk"
        value_template: "{{ ((value_json.data.rootfs.used / value_json.data.rootfs.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:harddisk
      - name: "lab-03 Uptime"
        value_template: "{{ (value_json.data.uptime / 86400) | round(1) }}"
        unit_of_measurement: "days"
        icon: mdi:clock-outline

  # ---- lab-04 (Dell Wyse J5005, 20GB, 10.0.10.4) ----
  - resource: "https://10.0.10.4:8006/api2/json/nodes/lab-04/status"
    scan_interval: 30
    verify_ssl: false
    headers:
      Authorization: !secret proxmox_api_auth
    sensor:
      - name: "lab-04 CPU"
        value_template: "{{ (value_json.data.cpu * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:cpu-64-bit
      - name: "lab-04 Memory"
        value_template: "{{ ((value_json.data.memory.used / value_json.data.memory.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:memory
      - name: "lab-04 Disk"
        value_template: "{{ ((value_json.data.rootfs.used / value_json.data.rootfs.total) * 100) | round(1) }}"
        unit_of_measurement: "%"
        icon: mdi:harddisk
      - name: "lab-04 Uptime"
        value_template: "{{ (value_json.data.uptime / 86400) | round(1) }}"
        unit_of_measurement: "days"
        icon: mdi:clock-outline

template:
  - sensor:
      # ---- Vault cluster aggregate health ----
      - name: "Vault Cluster Health"
        unique_id: vault_cluster_health
        state: >-
          {% set v1 = states('sensor.vault_1_sealed') %}
          {% set v3 = states('sensor.vault_3_sealed') %}
          {% if v1 == 'unavailable' and v3 == 'unavailable' %}
            offline
          {% elif v1 == 'True' or v3 == 'True' %}
            sealed
          {% elif v1 == 'False' and v3 == 'False' %}
            healthy
          {% else %}
            degraded
          {% endif %}
        icon: >-
          {% if is_state('sensor.vault_cluster_health', 'healthy') %}
            mdi:shield-check
          {% elif is_state('sensor.vault_cluster_health', 'sealed') %}
            mdi:shield-lock
          {% elif is_state('sensor.vault_cluster_health', 'offline') %}
            mdi:shield-off
          {% else %}
            mdi:shield-alert
          {% endif %}

      # ---- Vault-2 unreachable indicator (informational) ----
      - name: "Vault 2 Status"
        unique_id: vault_2_status
        state: "unreachable"
        icon: mdi:shield-off-outline
        attributes:
          reason: "VLAN 60 (IoT) blocked from Security VLAN 50 by zone policy"
          node: "vault-2"
          ip: "10.0.50.2"
