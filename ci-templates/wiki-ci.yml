# =============================================================================
# GitLab CI/CD Template for Wiki Publishing
# =============================================================================
# Syncs docs/ directory and rendered D2 diagrams to the GitLab project wiki.
# The wiki becomes a browseable, always-up-to-date mirror of documentation.
#
# Jobs provided:
#   .wiki-publish  - Sync docs + diagrams to wiki, auto-generate Home page
#
# Prerequisites:
#   - Wiki must be initialized (create first page via GitLab UI)
#   - WIKI_PUSH_TOKEN CI/CD variable (project access token with
#     read_repository + write_repository scopes)
#   - Managed by Terraform Layer 03-gitlab-config
#
# Usage in .gitlab-ci.yml:
#   include:
#     - local: ci-templates/wiki-ci.yml
#
#   wiki:publish-docs:
#     extends: .wiki-publish
#     needs:
#       - job: d2:render-diagrams
#         artifacts: true
#         optional: true
# =============================================================================

# -----------------------------------------------------------------------------
# Wiki Publish Job
# -----------------------------------------------------------------------------
# Clones the project wiki Git repo, syncs documentation and rendered SVGs,
# generates a Home page with table of contents, and pushes changes.
#
# Docs are mapped to wiki pages with their original filenames (minus .md).
# Rendered D2 diagrams are placed in a diagrams/ subdirectory.
# Archive docs are placed in an archive/ subdirectory.
#
# Each script entry runs in the same shell (GitLab Runner uses /bin/sh -c
# with the entire script block), so cd persists across entries within a
# single | block. However, separate - entries are independent commands
# within the SAME shell session (Runner concatenates them). cd DOES persist
# across - entries in GitLab CI.
# -----------------------------------------------------------------------------

.wiki-publish:
  stage: publish
  image: alpine:latest
  tags: [docker]
  variables:
    DOCS_SRC: docs
    WIKI_BRANCH: main
  script:
    - apk add --no-cache git
    - git config --global user.email "ci@example-lab.org"
    - git config --global user.name "GitLab CI"
    # --- Clone wiki repo ---
    - echo "--- Cloning wiki repository ---"
    - >
      git clone --depth=1
      "https://wiki-push:${WIKI_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.wiki.git"
      wiki
    - cd wiki
    # --- Sync documentation files ---
    - echo "--- Syncing documentation ---"
    - |
      DOC_COUNT=0
      for f in ../${DOCS_SRC}/*.md; do
        [ -f "$f" ] || continue
        base=$(basename "$f")
        cp "$f" "./${base}"
        DOC_COUNT=$((DOC_COUNT + 1))
      done
      echo "  Synced ${DOC_COUNT} docs to wiki root"
    # --- Sync archive docs ---
    - |
      if [ -d "../${DOCS_SRC}/archive" ]; then
        mkdir -p archive
        ARCHIVE_COUNT=0
        for f in ../${DOCS_SRC}/archive/*.md; do
          [ -f "$f" ] || continue
          base=$(basename "$f")
          cp "$f" "archive/${base}"
          ARCHIVE_COUNT=$((ARCHIVE_COUNT + 1))
        done
        echo "  Synced ${ARCHIVE_COUNT} archive docs"
      fi
    # --- Sync rendered diagrams (from d2:render-diagrams artifacts) ---
    - |
      if [ -d "../${DOCS_SRC}/diagrams/rendered" ]; then
        mkdir -p diagrams
        DIAG_COUNT=0
        for f in ../${DOCS_SRC}/diagrams/rendered/*.svg; do
          [ -f "$f" ] || continue
          base=$(basename "$f")
          cp "$f" "diagrams/${base}"
          DIAG_COUNT=$((DIAG_COUNT + 1))
        done
        echo "  Synced ${DIAG_COUNT} rendered diagrams"
      else
        echo "  WARN: No rendered diagrams found (d2:render-diagrams dependency missing?)"
        DIAG_COUNT=0
      fi
    # --- Generate Home page (wiki landing page) ---
    - |
      PIPELINE_URL="${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/pipelines/${CI_PIPELINE_ID}"
      COMMIT_URL="${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/commit/${CI_COMMIT_SHA}"
      SHORT_SHA=$(echo "${CI_COMMIT_SHA}" | head -c 8)
      cat > home.md <<HOMEEOF
      # FirbLab Documentation

      > Auto-synced from [\`docs/\`](${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/tree/main/docs) by [CI pipeline #${CI_PIPELINE_ID}](${PIPELINE_URL}) ([\`${SHORT_SHA}\`](${COMMIT_URL}))

      ## Architecture & Diagrams

      ### Network Topology
      *VLAN topology, inter-VLAN routing, switches, Hetzner gateway*

      ![Network Topology](diagrams/network-topology.svg)

      ### Kubernetes Architecture
      *RKE2 cluster, ArgoCD app-of-apps, platform services*

      ![Kubernetes Architecture](diagrams/kubernetes-architecture.svg)

      ### Terraform Layers
      *IaC layer dependency graph (00-network → 06-hetzner)*

      ![Terraform Layers](diagrams/terraform-layers.svg)

      ## Infrastructure Documentation

      | Document | Description |
      |----------|-------------|
      | [Current State](CURRENT-STATE) | **Authoritative inventory** — all deployed infrastructure, IPs, status |
      | [Network](NETWORK) | Full network topology, VLANs, firewall rules, switch ports |
      | [Architecture](ARCHITECTURE) | System architecture and design decisions |
      | [Deployment](DEPLOYMENT) | Full deployment sequence for the platform |
      | [Deploy RKE2](DEPLOY-RKE2) | RKE2 cluster deployment and ArgoCD bootstrap |
      | [Security](SECURITY) | Security posture, CIS benchmarks, hardening |

      ## Operations

      | Document | Description |
      |----------|-------------|
      | [Vault Operations](VAULT-OPERATIONS) | Vault seal/unseal, backup, Raft operations |
      | [WireGuard Setup](WIREGUARD-SETUP) | WireGuard VPN gateway configuration |
      | [Service Directory](SERVICE-DIRECTORY) | **Emergency reference** — all service URLs, direct IPs, auth methods |
      | [Disaster Recovery](DISASTER-RECOVERY) | DR runbooks, dependency chains, recovery procedures |
      | [Runbooks](RUNBOOKS) | Operational runbooks for common tasks |
      | [Machine Onboarding](MACHINE-ONBOARDING) | Adding new Proxmox nodes, VMs, LXCs, bare metal |
      | [FirbLab OS](FIRBLAB-OS) | OS-level configuration and hardening notes |

      ## Archive

      | Document | Description |
      |----------|-------------|
      | [RKE2 Deploy Handoff](archive/HANDOFF-RKE2-DEPLOY) | Historical RKE2 deployment handoff notes |
      | [Handoff 2026-02-11](archive/HANDOFF-2026-02-11) | Session handoff — 2026-02-11 |
      | [Handoff 2026-02-12](archive/HANDOFF-2026-02-12) | Session handoff — 2026-02-12 |
      | [Network Cutover Directive](archive/layer_00_network_cutover_directive) | Original Layer 00 cutover plan (completed) |

      ---
      *Last synced: $(date -u '+%Y-%m-%d %H:%M UTC') by pipeline [#${CI_PIPELINE_ID}](${PIPELINE_URL})*
      HOMEEOF
      echo "  Generated Home page"
    # --- Commit and push if changed ---
    - git add -A
    - |
      if git diff --cached --quiet; then
        echo "--- No wiki changes — skipping push ---"
      else
        CHANGED=$(git diff --cached --stat | tail -1)
        echo "--- Wiki changes detected: ${CHANGED} ---"
        git commit -m "ci: sync docs + diagrams from ${CI_COMMIT_SHORT_SHA}

      Source commit: ${CI_COMMIT_SHA}
      Pipeline: ${CI_PIPELINE_ID}"
        git push origin HEAD:${WIKI_BRANCH}
        echo "--- Wiki updated successfully ---"
      fi
