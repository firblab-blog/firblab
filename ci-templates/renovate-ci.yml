# =============================================================================
# GitLab CI/CD Template for Renovate Bot
# =============================================================================
# Runs Renovate as a scheduled pipeline job to scan the monorepo for outdated
# dependencies and create MRs with version bumps.
#
# Authentication:
#   Uses Vault AppRole login (same as terraform-ci.yml) to read the GitLab PAT
#   from secret/services/gitlab/admin. Renovate needs a PAT with 'api' scope
#   to create branches and merge requests.
#
# Usage in .gitlab-ci.yml:
#   include:
#     - local: ci-templates/renovate-ci.yml
#
#   renovate:update-check:
#     extends: .renovate-run
#     rules:
#       - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_RUN == "true"
# =============================================================================

.renovate-run:
  stage: validate
  image:
    name: renovate/renovate:43
    entrypoint: [""]
  tags: [docker]
  variables:
    RENOVATE_PLATFORM: gitlab
    RENOVATE_ENDPOINT: "https://gitlab.home.example-lab.org/api/v4"
    RENOVATE_REPOSITORIES: "infrastructure/firblab"
    RENOVATE_ONBOARDING: "false"
    LOG_LEVEL: info
  before_script:
    - apk add --no-cache -q curl jq 2>/dev/null || apt-get update -qq && apt-get install -y -qq curl jq 2>/dev/null || true
    - |
      echo "--- Vault AppRole Login ---"
      VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" \
        -X POST -H "Content-Type: application/json" \
        -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" \
        "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")
      export VAULT_TOKEN
      echo "Vault token acquired (${#VAULT_TOKEN} chars)"
    - |
      echo "--- Read GitLab PAT from Vault ---"
      RENOVATE_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" \
        -H "X-Vault-Token: $VAULT_TOKEN" \
        "$VAULT_ADDR/v1/secret/data/services/gitlab/admin" | jq -r ".data.data.personal_access_token")
      export RENOVATE_TOKEN
      echo "GitLab PAT acquired (${#RENOVATE_TOKEN} chars)"
  script:
    - renovate
