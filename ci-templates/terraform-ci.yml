# =============================================================================
# GitLab CI/CD Template for Terraform Layers
# =============================================================================
# Reusable CI/CD jobs for Terraform projects. Each layer includes this
# template and overrides TF_ROOT to point to its directory.
#
# Jobs provided:
#   .terraform-validate  - Format check + validate (no Vault needed)
#   .terraform-scan      - tfsec + trivy security scanning (no Vault needed)
#   .terraform-plan      - Plan with artifact output (Vault login included)
#   .terraform-apply     - Apply from saved plan (Vault login included)
#   .vault-login         - Reusable Vault AppRole login snippet
#
# Vault authentication:
#   Plan/apply/destroy jobs automatically exchange AppRole credentials
#   (VAULT_ROLE_ID + VAULT_SECRET_ID instance CI/CD variables) for a
#   short-lived VAULT_TOKEN. The Terraform Vault provider reads VAULT_ADDR,
#   VAULT_TOKEN, and VAULT_CACERT from env automatically.
#
# Usage in .gitlab-ci.yml:
#   include:
#     - local: ci-templates/terraform-ci.yml
#
#   terraform:00-network:plan:
#     extends: .terraform-plan
#     variables:
#       TF_ROOT: terraform/layers/00-network
# =============================================================================

variables:
  TF_VERSION: "1.9.0"
  # Pass the VAULT_CACERT file-type CI/CD variable path to Terraform so
  # Layer 03 can read the CA cert content even though the local default
  # path (~/.lab/tls/ca/ca.pem) doesn't exist inside the CI container.
  TF_VAR_vault_cacert_env_override: "$VAULT_CACERT"

# -----------------------------------------------------------------------------
# Base Template
# -----------------------------------------------------------------------------

.terraform:
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  tags: [docker]
  before_script:
    - cd ${TF_ROOT}
    - terraform --version
    - terraform init -backend=false

# -----------------------------------------------------------------------------
# Vault AppRole Login (for jobs that need Vault access)
# -----------------------------------------------------------------------------
# Exchanges VAULT_ROLE_ID + VAULT_SECRET_ID (instance-level CI/CD variables)
# for a short-lived VAULT_TOKEN (1h TTL). The Terraform Vault provider reads
# VAULT_ADDR, VAULT_TOKEN, and VAULT_CACERT from env automatically.
#
# Uses curl + jq (both ~2s install on Alpine) to hit the Vault API
# directly — no vault CLI binary needed.
#
# This hidden job exists for documentation and as a reusable reference.
# Plan/apply/destroy jobs inline the login in their before_script because
# YAML extends merges (not appends) before_script arrays.
# -----------------------------------------------------------------------------

.vault-login:
  before_script:
    - apk add --no-cache -q curl jq
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"

# -----------------------------------------------------------------------------
# Validate Jobs
# -----------------------------------------------------------------------------

.terraform-fmt:
  extends: .terraform
  stage: validate
  script:
    - terraform fmt -check -recursive -diff
  allow_failure: true

.terraform-validate:
  extends: .terraform
  stage: validate
  script:
    - terraform fmt -check -recursive -diff
    - terraform validate

# -----------------------------------------------------------------------------
# Security Scanning Jobs
# -----------------------------------------------------------------------------

.terraform-tfsec:
  stage: scan
  image:
    name: aquasec/tfsec:latest
    entrypoint: [""]
  tags: [docker]
  script:
    - tfsec ${TF_ROOT} --minimum-severity HIGH --format=junit > tfsec-report.xml
  artifacts:
    reports:
      junit: tfsec-report.xml
    when: always
  allow_failure: true

.terraform-trivy:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  tags: [docker]
  script:
    - trivy config ${TF_ROOT}
  allow_failure: true

.terraform-scan:
  stage: scan
  image:
    name: aquasec/tfsec:latest
    entrypoint: [""]
  tags: [docker]
  script:
    - tfsec ${TF_ROOT} --minimum-severity HIGH
  allow_failure: true

# -----------------------------------------------------------------------------
# Plan Job
# -----------------------------------------------------------------------------

.terraform-plan:
  extends: .terraform
  stage: plan
  before_script:
    - apk add --no-cache -q curl jq
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"
    - cd ${TF_ROOT}
    - terraform init
  script:
    - terraform plan -out=tfplan.binary
    - terraform show -json tfplan.binary > tfplan.json
  artifacts:
    paths:
      - ${TF_ROOT}/tfplan.binary
      - ${TF_ROOT}/tfplan.json
    expire_in: 1 week
    when: always
  # Plan jobs use local backend (no remote state yet). Plans against empty state
  # will fail with provider auth/API errors. Allow failure until S3 remote
  # backend is implemented, so visualize stage can still proceed.
  allow_failure: true

# -----------------------------------------------------------------------------
# Apply Job
# -----------------------------------------------------------------------------

.terraform-apply:
  extends: .terraform
  stage: apply
  before_script:
    - apk add --no-cache -q curl jq
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"
    - cd ${TF_ROOT}
    - terraform init
  script:
    - terraform apply -auto-approve tfplan.binary
    # Back up tfstate to S3 after successful apply (age-encrypted, if S3 vars are set)
    - |
      if [ -n "${TFSTATE_BACKUP_BUCKET:-}" ] && [ -f terraform.tfstate ]; then
        LAYER_NAME=$(basename "${TF_ROOT}")
        TIMESTAMP=$(date +%Y%m%d%H%M%S)
        BACKUP_FILE="tfstate-${LAYER_NAME}-${TIMESTAMP}.json.age"
        echo "Backing up tfstate (encrypted) to s3://${TFSTATE_BACKUP_BUCKET}/${LAYER_NAME}/${BACKUP_FILE}..."
        # Install aws CLI + age if not present (Alpine)
        if ! command -v aws >/dev/null 2>&1; then
          apk add --no-cache -q py3-pip && pip3 install --quiet --break-system-packages awscli
        fi
        if ! command -v age >/dev/null 2>&1; then
          apk add --no-cache -q age
        fi
        # Read S3 credentials from Vault
        S3_CREDS=$(curl -sf --cacert "$VAULT_CACERT" \
          -H "X-Vault-Token: $VAULT_TOKEN" \
          "$VAULT_ADDR/v1/secret/data/infra/hetzner" | jq -r '.data.data')
        export AWS_ACCESS_KEY_ID=$(echo "$S3_CREDS" | jq -r '.s3_access_key')
        export AWS_SECRET_ACCESS_KEY=$(echo "$S3_CREDS" | jq -r '.s3_secret_key')
        # Read age public key from Vault for encryption
        AGE_RECIPIENT=$(curl -sf --cacert "$VAULT_CACERT" \
          -H "X-Vault-Token: $VAULT_TOKEN" \
          "$VAULT_ADDR/v1/secret/data/backup/age-key" | jq -r '.data.data.public_key')
        if [ -n "${AGE_RECIPIENT:-}" ]; then
          age -r "${AGE_RECIPIENT}" -o "terraform.tfstate.age" terraform.tfstate
          aws s3 cp --endpoint-url "https://${TFSTATE_S3_ENDPOINT}" \
            terraform.tfstate.age \
            "s3://${TFSTATE_BACKUP_BUCKET}/${LAYER_NAME}/${BACKUP_FILE}" --quiet && \
            echo "tfstate backup uploaded (age-encrypted)." || \
            echo "WARNING: tfstate S3 backup failed (non-fatal)."
          rm -f terraform.tfstate.age
        else
          echo "WARNING: Could not read age key from Vault. Skipping tfstate backup."
        fi
      fi
  when: manual

# -----------------------------------------------------------------------------
# Destroy Job (use with caution)
# -----------------------------------------------------------------------------

.terraform-destroy:
  extends: .terraform
  stage: apply
  before_script:
    - apk add --no-cache -q curl jq
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"
    - cd ${TF_ROOT}
    - terraform init
  script:
    - terraform destroy -auto-approve
  when: manual
