# =============================================================================
# GitLab CI/CD Template for Kubernetes Manifests
# =============================================================================
# Reusable CI/CD jobs for Kubernetes manifest validation and deployment.
#
# Jobs provided:
#   .k8s-yaml-validate   - YAML linting
#   .k8s-scan            - kubesec + trivy security scanning
#   .k8s-dry-run         - kubectl dry-run validation
#   .k8s-kustomize-build - Kustomize build + validation
#   .k8s-deploy          - kubectl apply (manual gate)
#
# Usage in .gitlab-ci.yml:
#   include:
#     - local: ci-templates/kubernetes-ci.yml
# =============================================================================

variables:
  KUBECONFIG: /tmp/kubeconfig
  KUBECTL_VERSION: "1.30"

# -----------------------------------------------------------------------------
# Base Template
# -----------------------------------------------------------------------------

.kubectl:
  image: bitnami/kubectl:${KUBECTL_VERSION}
  tags: [docker]
  before_script:
    - kubectl version --client

# -----------------------------------------------------------------------------
# Validate Jobs
# -----------------------------------------------------------------------------

.k8s-yaml-validate:
  stage: validate
  image: cytopia/yamllint:latest
  tags: [docker]
  script:
    - yamllint ${K8S_ROOT:-k8s/}

.k8s-kubeval:
  stage: validate
  image: garethr/kubeval:latest
  tags: [docker]
  script:
    - kubeval ${K8S_ROOT:-k8s/}**/*.yaml
  allow_failure: true

# -----------------------------------------------------------------------------
# Security Scanning Jobs
# -----------------------------------------------------------------------------

.k8s-kubesec:
  stage: scan
  image: docker.io/kubesec/kubesec:8535148
  tags: [docker]
  script:
    - kubesec scan ${K8S_ROOT:-k8s/}**/*.yaml
  allow_failure: true

.k8s-trivy:
  stage: scan
  image: aquasec/trivy:latest
  tags: [docker]
  script:
    - trivy config ${K8S_ROOT:-k8s/}
  allow_failure: true

.k8s-scan:
  stage: scan
  image: aquasec/trivy:latest
  tags: [docker]
  script:
    - trivy config ${K8S_ROOT:-k8s/}
  allow_failure: true

# -----------------------------------------------------------------------------
# Test Jobs
# -----------------------------------------------------------------------------

.k8s-dry-run:
  extends: .kubectl
  stage: validate
  script:
    - kubectl apply --dry-run=client -f ${K8S_ROOT:-k8s/}

.k8s-kustomize-build:
  stage: validate
  image: alpine/k8s:${KUBECTL_VERSION}
  tags: [docker]
  script:
    - kustomize build ${KUSTOMIZE_ROOT:-k8s/workloads/} > deployment.yaml
    - kubectl apply --dry-run=client -f deployment.yaml
  artifacts:
    paths:
      - deployment.yaml
    expire_in: 1 day

# -----------------------------------------------------------------------------
# Deploy Jobs
# -----------------------------------------------------------------------------

.k8s-deploy:
  extends: .kubectl
  stage: configure
  script:
    - kubectl apply -f ${K8S_ROOT:-k8s/} -n ${K8S_NAMESPACE:-default}
  when: manual
