# =============================================================================
# Critical Tier — Manual Gate
# =============================================================================
# These services require manual review before deployment:
#   - RKE2: Kubernetes upgrades require sequential node draining
#   - GitLab: Major versions have required-stops; hosts the CI itself
#   - Authentik: SSO provider — outage affects all ForwardAuth services
#   - Traefik: Reverse proxy — outage affects all HTTP services
#   - Vault: Secret store — outage affects all Vault-dependent deploys
#
# Jobs appear in the pipeline with a ▶ button. Click to deploy.
# allow_failure: true prevents blocking unrelated pipeline stages.
# =============================================================================

# --- GitLab CE ---
deploy:gitlab:
  extends: .ansible-auto-deploy
  variables:
    PLAYBOOK: ansible/playbooks/gitlab-deploy.yml
    SSH_HOSTS: "gitlab"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ansible/roles/gitlab/**/*
        - ansible/playbooks/gitlab-deploy.yml
      when: manual
  allow_failure: true

# --- RKE2 Kubernetes Cluster ---
deploy:rke2:
  extends: .ansible-auto-deploy
  variables:
    PLAYBOOK: ansible/playbooks/rke2-deploy.yml
    SSH_HOSTS: "lab-01,rke2-server-1,rke2-server-2,rke2-server-3,rke2-agent-1,rke2-agent-2,rke2-agent-3"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ansible/roles/rke2/**/*
        - ansible/inventory/group_vars/rke2_cluster.yml
        - ansible/playbooks/rke2-deploy.yml
      when: manual
  allow_failure: true

