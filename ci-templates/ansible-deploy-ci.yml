# =============================================================================
# GitLab CI/CD — Ansible Auto-Deploy Jobs
# =============================================================================
# Per-service deploy jobs triggered by changes on the main branch.
# Each job extends .ansible-auto-deploy (defined in ansible-ci.yml) which
# handles Vault AppRole login, SSH key injection, and cleanup.
#
# Two tiers:
#   Standard  — Auto-deploy on merge (when: on_success). Safe services with
#               health checks and easy rollback via git revert.
#   Critical  — Manual gate (when: manual). Infrastructure services where
#               upgrades require careful sequencing or have blast radius.
#
# SSH_HOSTS format: comma-separated Vault secret/compute/<hostname> entries.
#   - VLAN 20/30 targets need lab-01 as jump host (first in list)
#   - VLAN 10 targets connect directly (no jump host needed)
#   - Hetzner connects via public internet (no jump host needed)
#
# Adding a new service:
#   1. Ensure SSH key is in Vault at secret/compute/<hostname>
#   2. Add key path mapping to scripts/ci-setup-ssh.sh
#   3. Add a deploy job below following the existing pattern
# =============================================================================

# =============================================================================
# Standard Tier — Auto-Deploy on Merge
# =============================================================================
# These services are low-risk for automated deployment:
#   - Docker Compose based (docker compose up -d handles rolling updates)
#   - All playbooks have health checks tagged 'verify'
#   - Rollback: git revert → auto-deploys previous version
# =============================================================================

# --- Ghost (blog platform) ---
deploy:ghost:
  extends: .ansible-auto-deploy
  variables:
    PLAYBOOK: ansible/playbooks/ghost-deploy.yml
    SSH_HOSTS: "lab-01,ghost"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ansible/roles/ghost/**/*
        - ansible/playbooks/ghost-deploy.yml

