# =============================================================================
# GitLab CI/CD Template for Ansible Playbooks
# =============================================================================
# Reusable CI/CD jobs for Ansible projects.
#
# Jobs provided:
#   .ansible-syntax      - Playbook syntax checking (no Vault needed)
#   .ansible-lint        - ansible-lint + yamllint (no Vault needed)
#   .ansible-dry-run     - Check mode with diff output (no Vault needed)
#   .ansible-deploy      - Manual playbook execution (Vault login included)
#   .ansible-auto-deploy - Auto-deploy with SSH key injection from Vault
#   .vault-login         - Reusable Vault AppRole login snippet
#
# Vault authentication:
#   Deploy jobs automatically exchange AppRole credentials for a short-lived
#   VAULT_TOKEN. Playbooks that need Vault access read VAULT_TOKEN from env.
#
# SSH key injection (.ansible-auto-deploy only):
#   SSH keys are stored in Vault at secret/compute/<hostname>. The auto-deploy
#   template reads SSH_HOSTS (comma-separated) and fetches only the keys needed
#   for that specific playbook. See scripts/ci-setup-ssh.sh for the mapping.
#
# Usage in .gitlab-ci.yml:
#   include:
#     - local: ci-templates/ansible-ci.yml
#
#   ansible:harden:syntax:
#     extends: .ansible-syntax
#     variables:
#       PLAYBOOK: ansible/playbooks/harden.yml
# =============================================================================

variables:
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"
  ANSIBLE_ROLES_PATH: ansible/roles

# -----------------------------------------------------------------------------
# Base Template
# -----------------------------------------------------------------------------

.ansible:
  image: cytopia/ansible:latest-tools
  tags: [docker]
  before_script:
    - ansible --version

# -----------------------------------------------------------------------------
# Vault AppRole Login (for jobs that need Vault access)
# -----------------------------------------------------------------------------
# Exchanges VAULT_ROLE_ID + VAULT_SECRET_ID (instance-level CI/CD variables)
# for a short-lived VAULT_TOKEN (1h TTL).
#
# Uses curl + jq (installed via apk in Alpine-based image) to hit the Vault
# API directly — no vault CLI binary needed.
#
# This hidden job exists for documentation and as a reusable reference.
# Deploy jobs inline the login in their before_script because YAML extends
# merges (not appends) before_script arrays.
# -----------------------------------------------------------------------------

.vault-login:
  before_script:
    - apk add --no-cache -q curl jq > /dev/null 2>&1
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"

# -----------------------------------------------------------------------------
# Validate Jobs
# -----------------------------------------------------------------------------

.ansible-syntax:
  extends: .ansible
  stage: validate
  script:
    - ansible-playbook --syntax-check ${PLAYBOOK:-ansible/playbooks/*.yml}

# -----------------------------------------------------------------------------
# Lint Jobs
# -----------------------------------------------------------------------------

.ansible-lint:
  stage: validate
  image: pipelinecomponents/ansible-lint:latest
  tags: [docker]
  script:
    - ansible-lint ${PLAYBOOK:-ansible/playbooks/ ansible/roles/}
  allow_failure: true

.ansible-yaml-lint:
  stage: validate
  image: cytopia/yamllint:latest
  tags: [docker]
  script:
    - yamllint ansible/
  allow_failure: true

# -----------------------------------------------------------------------------
# Test Jobs (Dry Run)
# -----------------------------------------------------------------------------

.ansible-dry-run:
  extends: .ansible
  stage: validate
  script:
    - ansible-playbook ${PLAYBOOK} --check --diff
  allow_failure: true

# -----------------------------------------------------------------------------
# Deploy Jobs
# -----------------------------------------------------------------------------

.ansible-deploy:
  extends: .ansible
  stage: configure
  before_script:
    - apk add --no-cache -q curl jq > /dev/null 2>&1
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"
    - ansible --version
  script:
    - ansible-playbook ${PLAYBOOK}
  when: manual

# -----------------------------------------------------------------------------
# Auto-Deploy Jobs (with SSH key injection from Vault)
# -----------------------------------------------------------------------------
# Extended template for CI/CD auto-deployment. Fetches SSH keys from Vault
# at secret/compute/<hostname>, writes them to the paths the Ansible inventory
# expects, installs the vault CLI (for playbook delegate_to: localhost tasks),
# then runs the playbook.
#
# Variables (set per-job):
#   PLAYBOOK   — Path to the Ansible playbook (e.g., ansible/playbooks/ghost-deploy.yml)
#   SSH_HOSTS  — Comma-separated Vault hostnames to fetch keys for
#                Include the jump host (lab-01) for VLAN 20/30 targets.
#
# Usage in ansible-deploy-ci.yml:
#   deploy:ghost:
#     extends: .ansible-auto-deploy
#     variables:
#       PLAYBOOK: ansible/playbooks/ghost-deploy.yml
#       SSH_HOSTS: "lab-01,ghost"
#     rules:
#       - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
#         changes: [ansible/roles/ghost/**]
# -----------------------------------------------------------------------------

.ansible-auto-deploy:
  extends: .ansible
  stage: deploy
  before_script:
    # Fix world-writable checkout dir so Ansible loads ansible.cfg
    - chmod o-w "$CI_PROJECT_DIR"
    # Install dependencies (Alpine-based image)
    - apk add --no-cache -q curl jq openssh-client unzip > /dev/null 2>&1
    # Vault AppRole login
    - 'VAULT_TOKEN=$(curl -sf --cacert "$VAULT_CACERT" -X POST -H "Content-Type: application/json" -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" "$VAULT_ADDR/v1/auth/approle/login" | jq -r ".auth.client_token")'
    - export VAULT_TOKEN
    - echo "Vault token acquired (${#VAULT_TOKEN} chars, expires in 1h)"
    # Install vault CLI (playbooks use 'vault kv get' in delegate_to: localhost tasks)
    - >-
      VAULT_VER="1.18.5" &&
      curl -sfL "https://releases.hashicorp.com/vault/${VAULT_VER}/vault_${VAULT_VER}_linux_amd64.zip"
      -o /tmp/vault.zip &&
      unzip -qo /tmp/vault.zip -d /usr/local/bin/ &&
      rm /tmp/vault.zip
    # Create ~/.lab/tls/ca/ca.pem — playbooks hardcode this path for vault CLI
    - mkdir -p "$HOME/.lab/tls/ca" && cp "$VAULT_CACERT" "$HOME/.lab/tls/ca/ca.pem"
    # Fetch SSH keys from Vault and write to inventory-expected paths
    - bash scripts/ci-setup-ssh.sh
    - ansible --version
  script:
    - ansible-playbook ${PLAYBOOK}
  after_script:
    # Clean up SSH keys from the container (defense in depth)
    - rm -rf "$HOME/.ssh"
    - find "${CI_PROJECT_DIR}/terraform" -name ".secrets" -type d -exec rm -rf {} + 2>/dev/null || true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
