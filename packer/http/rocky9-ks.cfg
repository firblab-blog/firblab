# =============================================================================
# Rocky Linux 9 Kickstart - Packer Base Template
# =============================================================================
# Minimal server install for Packer template builds. Creates the admin user
# with temporary password (replaced by SSH keys post-build via cloud-init).
# =============================================================================

# Installation source
cdrom

# System language and keyboard
lang en_US.UTF-8
keyboard us
timezone UTC --utc

# Network (DHCP for build, cloud-init handles final config)
network --bootproto=dhcp --device=link --activate --onboot=on

# Firewall and SELinux
firewall --enabled --service=ssh
selinux --enforcing

# User setup
rootpw --lock
user --name=admin --groups=wheel --plaintext --password=packer

# Disk partitioning (single partition, cloud-init compatible)
zerombr
clearpart --all --initlabel
autopart --type=plain --nohome

# Boot loader
bootloader --location=mbr --driveorder=sda

# Packages
# NOTE: Only packages available on the Minimal ISO are listed here.
# qemu-guest-agent, cloud-init, etc. are NOT on the Minimal ISO — they
# require the AppStream repo (network). Install them in %post via dnf.
%packages --ignoremissing
@core
openssh-server
%end

# Post-installation
%post --log=/root/ks-post.log
# Enable passwordless sudo for admin user
echo 'admin ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/admin
chmod 0440 /etc/sudoers.d/admin

# Install packages that aren't on the Minimal ISO (requires network/AppStream)
dnf -y install qemu-guest-agent cloud-init cloud-utils-growpart curl wget jq

# Enable essential services
systemctl enable sshd
systemctl enable qemu-guest-agent
systemctl enable cloud-init
%end

# Reboot after installation
reboot --eject
