# =============================================================================
# SonarQube Project Configuration — recall
# =============================================================================
# Copy this file to the root of the recall repo as: sonar-project.properties
# =============================================================================

sonar.projectKey=infrastructure_recall
sonar.projectName=recall

sonar.sources=.
sonar.exclusions=\
  .sonar/**,\
  **/.git/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/dist/**,\
  **/build/**

sonar.sourceEncoding=UTF-8
