# =============================================================================
# SonarQube Project Configuration — guardrail
# =============================================================================
# Copy this file to the root of the guardrail repo as: sonar-project.properties
# =============================================================================

sonar.projectKey=infrastructure_guardrail
sonar.projectName=guardrail

sonar.sources=.
sonar.exclusions=\
  .sonar/**,\
  **/.git/**,\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/dist/**,\
  **/build/**

sonar.sourceEncoding=UTF-8
