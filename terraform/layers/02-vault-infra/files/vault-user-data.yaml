#cloud-config
# =============================================================================
# Vault Node Cloud-Init User Data (Rocky Linux 9)
# =============================================================================
# Prepares a cloned Rocky 9 Packer template for Vault installation via Ansible:
#   - Sets hostname and SSH access
#   - Installs any additional packages not in the Packer template
#   - Creates vault user/group and data directories
#   - Formats and mounts the Raft data disk
#   - Does NOT install Vault itself (handled by Ansible vault role)
#
# The Packer template (VM 9001) already provides:
#   SSH hardening, firewalld (drop zone), fail2ban, SELinux enforcing,
#   kernel security params, auditd, qemu-guest-agent, cloud-init,
#   curl, wget, jq, unzip
# =============================================================================

hostname: ${hostname}
fqdn: ${hostname}.example-lab.local
manage_etc_hosts: true

# ---------------------------------------------------------
# SSH and User Configuration
# ---------------------------------------------------------
# Explicitly define the admin user to align with the Proxmox
# initialization user_account block (which creates "admin").
# Using "- default" would create the distro's default user
# (rocky on Rocky 9), causing a mismatch with Terraform.
# ---------------------------------------------------------
ssh_pwauth: false
disable_root: true

users:
  - name: admin
    gecos: Lab Administrator
    groups: [wheel]
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    shell: /bin/bash
    lock_passwd: true
    ssh_authorized_keys:
      - ${ssh_key}
  - name: vault
    gecos: HashiCorp Vault
    shell: /bin/false
    system: true
    no_create_home: true
    groups:
      - vault

# ---------------------------------------------------------
# Package Installation
# ---------------------------------------------------------
# Most packages are already baked into the Rocky 9 Packer template.
# Only install packages specific to the Vault role that aren't in the template.
package_update: true
package_upgrade: true

packages:
  - acl

# ---------------------------------------------------------
# Vault User and Group
# ---------------------------------------------------------
groups:
  - vault

# ---------------------------------------------------------
# Directory Setup and Disk Preparation
# ---------------------------------------------------------
runcmd:
  # Ensure qemu-guest-agent is running (baked by Packer, just verify)
  - systemctl enable --now qemu-guest-agent

  # Create Vault directories
  - mkdir -p /opt/vault/data
  - mkdir -p /opt/vault/tls
  - mkdir -p /opt/vault/plugins
  - mkdir -p /etc/vault.d

  # Wait for the data disk (scsi1) to appear
  - |
    for i in $(seq 1 30); do
      if [ -b /dev/sdb ]; then
        break
      fi
      sleep 2
    done

  # Format and mount the data disk if it exists and is not already formatted
  - |
    if [ -b /dev/sdb ]; then
      if ! blkid /dev/sdb | grep -q TYPE; then
        mkfs.ext4 -L vault-data /dev/sdb
      fi
      echo 'LABEL=vault-data /opt/vault/data ext4 defaults,noatime 0 2' >> /etc/fstab
      mount -a
    fi

  # Set ownership on all Vault directories
  - chown -R vault:vault /opt/vault
  - chown -R vault:vault /etc/vault.d
  - chmod 750 /opt/vault/data
  - chmod 700 /opt/vault/tls

  # Set up sysctl tuning for Vault
  - |
    cat >> /etc/sysctl.d/99-vault.conf <<SYSCTL
    # Vault performance tuning
    vm.swappiness=1
    net.core.somaxconn=65535
    net.ipv4.tcp_max_syn_backlog=65535
    SYSCTL
  - sysctl --system

  # Disable swap (Vault recommends no swap for consistent performance)
  - swapoff -a
  - sed -i '/swap/d' /etc/fstab

# ---------------------------------------------------------
# Final Message
# ---------------------------------------------------------
final_message: "Cloud-init for ${hostname} completed after $UPTIME seconds. Ready for Ansible Vault provisioning."
