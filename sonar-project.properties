# =============================================================================
# SonarQube Project Configuration — firblab
# =============================================================================
# Project key must be unique across SonarQube. Convention: <group>_<project>.
# This file is read by sonar-scanner-cli in CI (ci-templates/sonarqube-ci.yml).
# =============================================================================

sonar.projectKey=infrastructure_firblab
sonar.projectName=firblab

# Analyze the whole monorepo
sonar.sources=.

# Exclude generated files, secrets directories, chart caches, and binary artifacts
sonar.exclusions=\
  .sonar/**,\
  **/.terraform/**,\
  **/terraform.tfstate*,\
  **/.git/**,\
  **/node_modules/**,\
  **/*.tfplan,\
  packer/http/**

# Python source encoding
sonar.sourceEncoding=UTF-8
