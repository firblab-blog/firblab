---
# =============================================================================
# Proxmox API Token Setup for Terraform & Packer
# =============================================================================
# Creates a dedicated Proxmox user, role, and API token for Terraform and
# Packer to authenticate against the Proxmox API. Idempotent — safe to re-run.
#
# Both Terraform and Packer share the same token (stored in Vault). The role
# includes all privileges needed by both tools, including guest agent access
# required by Packer for VM IP discovery during template builds.
#
# After token creation, the playbook automatically seeds the credentials into
# Vault at secret/infra/proxmox/<node> (url, token_id, token_secret).
# Requires: vault CLI on controller, VAULT_TOKEN set, CA cert at vault_lookup_ca_cert.
#
# If the token already exists (re-run), the Vault seed is skipped — the token
# secret is only available at creation time and cannot be retrieved later.
#
# Usage:
#   ansible-playbook ansible/playbooks/proxmox-api-setup.yml --limit lab-02
#
# Verify:
#   vault kv get secret/infra/proxmox/lab-02
#   curl -sk -H "Authorization: PVEAPIToken=terraform@pam!terraform-token=<secret>" \
#     https://<node-ip>:8006/api2/json/version | jq .
# =============================================================================

- name: "Create Proxmox API Token for Terraform & Packer"
  hosts: proxmox_nodes
  become: true
  gather_facts: false

  vars:
    pve_terraform_user: "terraform@pam"
    pve_terraform_role: "TerraformProv"
    pve_terraform_token_name: "terraform-token"
    # Privileges validated against Proxmox VE 9.x (pveum role list)
    # PVE 9 replaced VM.Monitor with granular VM.GuestAgent.* privileges:
    #   VM.GuestAgent.Audit        — read-only guest agent queries (network-get-interfaces)
    #   VM.GuestAgent.Unrestricted — arbitrary guest agent commands
    #   VM.GuestAgent.FileRead     — read files via guest agent
    #   VM.GuestAgent.FileWrite    — write files via guest agent
    # Packer needs VM.GuestAgent.Audit to discover VM IP for SSH provisioning.
    pve_terraform_privileges:
      - VM.Allocate
      - VM.Audit
      - VM.Backup
      - VM.Clone
      - VM.Config.CDROM
      - VM.Config.CPU
      - VM.Config.Cloudinit
      - VM.Config.Disk
      - VM.Config.HWType
      - VM.Config.Memory
      - VM.Config.Network
      - VM.Config.Options
      - VM.Console
      - VM.GuestAgent.Audit
      - VM.Migrate
      - VM.PowerMgmt
      - VM.Snapshot
      - VM.Snapshot.Rollback
      - Datastore.Allocate
      - Datastore.AllocateSpace
      - Datastore.AllocateTemplate
      - Datastore.Audit
      - SDN.Use
      - Sys.Audit
      - Sys.Modify

  tasks:
    # -----------------------------------------------------------------
    # Proxmox Role
    # -----------------------------------------------------------------
    - name: Check if Terraform role exists
      ansible.builtin.command: pveum role list --output-format json
      register: pve_roles
      changed_when: false

    - name: Create Terraform provisioning role
      ansible.builtin.command: >
        pveum role add {{ pve_terraform_role }}
        --privs "{{ pve_terraform_privileges | join(',') }}"
      when: pve_terraform_role not in (pve_roles.stdout | from_json | map(attribute='roleid'))

    - name: Update Terraform provisioning role privileges
      ansible.builtin.command: >
        pveum role modify {{ pve_terraform_role }}
        --privs "{{ pve_terraform_privileges | join(',') }}"
      when: pve_terraform_role in (pve_roles.stdout | from_json | map(attribute='roleid'))
      changed_when: true

    # -----------------------------------------------------------------
    # Proxmox User
    # -----------------------------------------------------------------
    - name: Check if terraform user exists
      ansible.builtin.command: pveum user list --output-format json
      register: pve_users
      changed_when: false

    - name: Create terraform user
      ansible.builtin.command: pveum user add {{ pve_terraform_user }}
      when: pve_terraform_user not in (pve_users.stdout | from_json | map(attribute='userid'))

    # -----------------------------------------------------------------
    # ACL (Role → User binding)
    # -----------------------------------------------------------------
    - name: Apply role to terraform user at root path
      ansible.builtin.command: >
        pveum acl modify / --users {{ pve_terraform_user }} --roles {{ pve_terraform_role }}
      changed_when: false

    # -----------------------------------------------------------------
    # API Token
    # -----------------------------------------------------------------
    - name: Check if token already exists
      ansible.builtin.command: >
        pveum user token list {{ pve_terraform_user }} --output-format json
      register: pve_tokens
      changed_when: false

    - name: Create API token (privilege separation disabled)
      ansible.builtin.command: >
        pveum user token add {{ pve_terraform_user }} {{ pve_terraform_token_name }}
        --privsep 0 --output-format json
      register: pve_token_result
      when: >
        pve_terraform_token_name not in
        (pve_tokens.stdout | from_json | map(attribute='tokenid')
        | map('regex_replace', '.*!', '') | list)

    - name: Display token summary
      vars:
        token_data: "{{ pve_token_result.stdout | from_json }}"
      ansible.builtin.debug:
        msg: |-
          ============================================================
          Proxmox API Token Created for {{ inventory_hostname }}
          ============================================================
          Token ID:     {{ token_data['full-tokenid'] }}
          Full Token:   {{ token_data['full-tokenid'] }}={{ token_data.value }}
          Vault Path:   secret/infra/proxmox/{{ inventory_hostname }}
          ============================================================
          Seeding into Vault automatically...
      when: pve_token_result is changed

    # -----------------------------------------------------------------
    # Vault Seeding (automatic — no manual vault kv put needed)
    # -----------------------------------------------------------------
    # Delegates to localhost (controller) where vault CLI + CA cert live.
    # Uses the same vault_addr / vault_lookup_ca_cert from group_vars/all.yml
    # that all other playbooks (argocd-bootstrap, ghost-deploy, etc.) use.
    # -----------------------------------------------------------------

    - name: Seed API token into Vault
      vars:
        token_data: "{{ pve_token_result.stdout | from_json }}"
      ansible.builtin.command:
        cmd: >-
          vault kv put -mount=secret infra/proxmox/{{ inventory_hostname }}
          url=https://{{ ansible_host }}:8006
          token_id={{ token_data['full-tokenid'] }}
          token_secret={{ token_data.value }}
      delegate_to: localhost
      become: false
      no_log: true
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_CACERT: "{{ vault_lookup_ca_cert | expanduser }}"
      when: pve_token_result is changed

    - name: Verify Vault secret was written
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -field=token_id infra/proxmox/{{ inventory_hostname }}
      delegate_to: localhost
      become: false
      register: _vault_verify
      changed_when: false
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_CACERT: "{{ vault_lookup_ca_cert | expanduser }}"
      when: pve_token_result is changed

    - name: Vault seed confirmed
      ansible.builtin.debug:
        msg: |-
          ============================================================
          ✓ Token seeded into Vault successfully
          ============================================================
          Path:     secret/infra/proxmox/{{ inventory_hostname }}
          Token ID: {{ _vault_verify.stdout }}
          Verify:   vault kv get secret/infra/proxmox/{{ inventory_hostname }}
          ============================================================
      when: pve_token_result is changed

    - name: Token already exists (no secret to display)
      ansible.builtin.debug:
        msg: >-
          Token '{{ pve_terraform_token_name }}' already exists for
          '{{ pve_terraform_user }}' on {{ inventory_hostname }}.
          Vault path secret/infra/proxmox/{{ inventory_hostname }} should already be seeded.
          If you need a new token, revoke the existing one first:
          pveum user token remove {{ pve_terraform_user }} {{ pve_terraform_token_name }}
      when: pve_token_result is skipped
