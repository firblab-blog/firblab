---
# =============================================================================
# Actual Budget Personal Finance Deployment Playbook
# =============================================================================
# Deploys Actual Budget via Docker Compose on an LXC container.
#
# Prerequisites:
#   - Actual Budget LXC provisioned by Terraform Layer 05
#   - LXC bootstrapped via lxc-bootstrap.yml (creates admin user, SSH keys)
#
# Usage:
#   export VAULT_ADDR=https://10.0.10.10:8200
#   export VAULT_TOKEN=hvs.xxxxx
#   export VAULT_CACERT=~/.lab/tls/ca/ca.pem
#   ansible-playbook -i inventory/hosts.yml playbooks/actualbudget-deploy.yml
#
# After playbook completes:
#   1. Go to Actual Budget: http://10.0.20.16:5006
#   2. Create a password and start using it
#
# Tags:
#   ansible-playbook ... --tags common      # Only baseline system config
#   ansible-playbook ... --tags docker      # Only Docker installation
#   ansible-playbook ... --tags actualbudget # Only Actual Budget app deployment
#   ansible-playbook ... --tags verify      # Only health checks
#   ansible-playbook ... --tags backup      # Only backup automation
# =============================================================================

- name: Deploy Actual Budget personal finance
  hosts: actualbudget
  become: true
  gather_facts: false
  serial: 1

  pre_tasks:
    - name: Wait for host to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300
      tags:
        - always

    - name: Gather system facts
      ansible.builtin.setup:
      tags:
        - always

    - name: Display deployment info
      ansible.builtin.debug:
        msg: >
          Deploying Actual Budget on {{ inventory_hostname }}
          (os={{ ansible_os_family }}, arch={{ ansible_architecture }},
          ip={{ ansible_host }})

    # -----------------------------------------------------------------
    # Backup secrets from Vault (for backup role)
    # -----------------------------------------------------------------
    - name: Read Hetzner S3 credentials from Vault (for backup)
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json infra/hetzner
      register: vault_hetzner_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [backup]

    - name: Read age public key from Vault (for backup)
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json backup/age-key
      register: vault_age_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [backup]

    - name: Set backup secrets
      ansible.builtin.set_fact:
        backup_s3_access_key: "{{ (vault_hetzner_read.stdout | from_json).data.data.s3_access_key }}"
        backup_s3_secret_key: "{{ (vault_hetzner_read.stdout | from_json).data.data.s3_secret_key }}"
        backup_s3_endpoint: "{{ (vault_hetzner_read.stdout | from_json).data.data.s3_endpoint }}"
        backup_age_recipient: "{{ (vault_age_read.stdout | from_json).data.data.public_key }}"
      when:
        - vault_hetzner_read.rc is defined and vault_hetzner_read.rc == 0
        - vault_age_read.rc is defined and vault_age_read.rc == 0
      no_log: true
      tags: [backup]

    - name: Disable S3 backup if Vault secrets unavailable
      ansible.builtin.set_fact:
        backup_enabled: false
      when: backup_s3_access_key is not defined
      tags: [backup]

    # -----------------------------------------------------------------
    # Restic backup secrets from Vault (for restic-backup role)
    # -----------------------------------------------------------------
    - name: Read Restic credentials from Vault
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json backup/restic
      register: vault_restic_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [backup, restic-backup]

    - name: Set Restic backup secrets
      ansible.builtin.set_fact:
        restic_repo_password: "{{ (vault_restic_read.stdout | from_json).data.data.repo_password }}"
        restic_repo_url: "rest:http://lab-03:{{ (vault_restic_read.stdout | from_json).data.data.firblab03_pass }}@{{ restic_server_ip }}:{{ restic_server_port }}/lab-03/"
      when:
        - vault_restic_read.rc is defined and vault_restic_read.rc == 0
      no_log: true
      tags: [backup, restic-backup]

    - name: Disable Restic backup if Vault secrets unavailable
      ansible.builtin.set_fact:
        restic_backup_enabled: false
      when: restic_repo_password is not defined
      tags: [backup, restic-backup]

    # -----------------------------------------------------------------
    # OIDC secrets from Vault (for Authentik SSO)
    # -----------------------------------------------------------------
    - name: Read Actual Budget OIDC credentials from Vault
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json services/actualbudget/oidc
      register: vault_oidc_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [actualbudget]

    - name: Set OIDC credentials
      ansible.builtin.set_fact:
        actualbudget_oidc_enabled: true
        actualbudget_oidc_client_id: "{{ (vault_oidc_read.stdout | from_json).data.data.client_id }}"
        actualbudget_oidc_client_secret: "{{ (vault_oidc_read.stdout | from_json).data.data.client_secret }}"
        actualbudget_oidc_discovery_url: "http://10.0.10.16:9000/application/o/actualbudget/"
      when: vault_oidc_read.rc is defined and vault_oidc_read.rc == 0
      no_log: true
      tags: [actualbudget]

  vars:
    # Backup configuration (S3 off-site for budget data)
    backup_enabled: true
    backup_cron_hour: "4"
    backup_cron_minute: "30"
    backup_services:
      - name: actualbudget
        compose_path: /opt/actualbudget
        paths:
          - /opt/actualbudget/data

    # Restic backup configuration (local backup to hdd-mirror-0 on lab-01)
    restic_backup_enabled: true
    restic_backup_services:
      - name: actualbudget
        stop_compose: /opt/actualbudget
        paths:
          - /opt/actualbudget/data
        tags: ["actualbudget", "finance"]
        cron_hour: "1"
        cron_minute: "30"

  roles:
    # Baseline system config + firewall (packages, NTP, fail2ban, SSH, UFW)
    - role: common
      tags:
        - common
        - firewall

    # NOTE: Hardening role is intentionally OMITTED for LXC containers.
    # LXC shares the host kernel — most CIS controls (sysctl, kernel
    # modules, AppArmor, auditd) either fail or are meaningless inside
    # an unprivileged container. Hardening is applied at the Proxmox
    # host level instead.

    # Docker CE
    - role: docker
      tags:
        - docker

    # Actual Budget (Docker Compose: single container, SQLite)
    - role: actualbudget
      tags:
        - actualbudget

    # Automated S3 backup (daily, age-encrypted)
    - role: backup
      tags:
        - backup

    # Restic backup to hdd-mirror-0 (local, dedup, verified)
    - role: restic-backup
      tags:
        - backup
        - restic-backup

  post_tasks:
    - name: Wait for Actual Budget to be accessible
      ansible.builtin.uri:
        url: "http://localhost:{{ actualbudget_port | default(5006) }}/"
        method: GET
        status_code: [200, 301, 302]
        follow_redirects: none
      register: actualbudget_health
      retries: 15
      delay: 10
      until: actualbudget_health.status is defined and actualbudget_health.status in [200, 301, 302]
      failed_when: false
      tags:
        - verify

    - name: Fail if Actual Budget never became accessible
      ansible.builtin.fail:
        msg: "Actual Budget failed to respond after 150 seconds. Last status: {{ actualbudget_health.status | default('connection refused') }}"
      when: actualbudget_health.status is not defined or actualbudget_health.status not in [200, 301, 302]
      tags:
        - verify

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Actual Budget Deployment Complete"
          - "=========================================="
          - "Host: {{ inventory_hostname }} ({{ ansible_host }})"
          - "URL: http://{{ ansible_host }}:{{ actualbudget_port | default(5006) }}"
          - "DNS: http://actualbudget.home.example-lab.org/"
          - "Port: {{ actualbudget_port | default(5006) }}"
          - "Image: {{ actualbudget_image }}"
          - ""
          - "Authentication: {{ 'Authentik OIDC (OpenID Connect)' if actualbudget_oidc_enabled | default(false) else 'Server password (set in web UI)' }}"
          - ""
          - "Management:"
          - "  docker compose -f /opt/actualbudget/docker-compose.yml ps"
          - "  docker compose -f /opt/actualbudget/docker-compose.yml logs -f"
          - "=========================================="
      tags:
        - verify
