---
# =============================================================================
# Proxmox Network Configuration Update (Day-2)
# =============================================================================
# Deploys /etc/network/interfaces on already-bootstrapped Proxmox nodes.
# The bootstrap playbook (proxmox-bootstrap.yml) Play 1 connects as root,
# which is permanently locked after initial setup. This playbook provides
# a safe day-2 path to update network configuration using the admin user.
#
# Uses the same proxmox-interfaces.j2 template as the bootstrap playbook.
# Supports vmbr0 (management bridge) and optional vmbr1 (storage bridge).
#
# Usage:
#   ansible-playbook playbooks/proxmox-network-update.yml --limit lab-01
#   ansible-playbook playbooks/proxmox-network-update.yml --limit lab-01 --check --diff
#
# WARNING: Changing proxmox_mgmt_bridge_ports to a NIC that doesn't exist
# or isn't cabled will kill network access — requiring physical console or
# cluster node shell recovery. Always verify NIC names on the host first
# with 'ip link show'.
# =============================================================================

- name: "Update Proxmox network configuration (day-2)"
  hosts: proxmox_nodes
  become: true
  gather_facts: true
  serial: 1
  tags: [network]

  vars:
    proxmox_mgmt_interface: vmbr0

  tasks:
    - name: Resolve bridge VLAN inventory for {{ inventory_hostname }}
      ansible.builtin.set_fact:
        proxmox_defined_vlans_sorted: "{{ network_vlans | dict2items | sort(attribute='value') }}"
        proxmox_bridge_vlan_names_resolved: "{{ proxmox_bridge_vlan_names | default((network_vlans | dict2items | sort(attribute='value') | map(attribute='key') | list)) }}"
        proxmox_bridge_vids_resolved: "{{ (network_vlans | dict2items | sort(attribute='value') | selectattr('key', 'in', (proxmox_bridge_vlan_names | default((network_vlans | dict2items | sort(attribute='value') | map(attribute='key') | list)))) | map(attribute='value') | map('string') | list) }}"

    - name: "PREFLIGHT: Verify requested bridge VLAN names exist in network_vlans"
      ansible.builtin.assert:
        that:
          - proxmox_bridge_vlan_names_resolved | difference(proxmox_defined_vlans_sorted | map(attribute='key') | list) | length == 0
          - proxmox_bridge_vids_resolved | length > 0
        fail_msg: >-
          Invalid Proxmox bridge VLAN selection for {{ inventory_hostname }}.
          Requested={{ proxmox_bridge_vlan_names_resolved | join(', ') }}
          Known={{ proxmox_defined_vlans_sorted | map(attribute='key') | join(', ') }}
        success_msg: "Resolved vmbr0 VLANs: {{ proxmox_bridge_vids_resolved | join(' ') }}"

    # -----------------------------------------------------------------
    # Preflight: Verify NICs exist before touching /etc/network/interfaces
    # -----------------------------------------------------------------
    - name: "PREFLIGHT: Verify management NIC {{ proxmox_mgmt_bridge_ports }} exists"
      ansible.builtin.command: "ip link show {{ proxmox_mgmt_bridge_ports }}"
      register: mgmt_nic_check
      changed_when: false
      failed_when: mgmt_nic_check.rc != 0

    - name: "PREFLIGHT: Verify storage NIC {{ proxmox_storage_bridge_ports }} exists"
      ansible.builtin.command: "ip link show {{ proxmox_storage_bridge_ports }}"
      register: storage_nic_check
      changed_when: false
      failed_when: storage_nic_check.rc != 0
      when: proxmox_storage_bridge_ports is defined

    - name: "PREFLIGHT: Detect management NIC driver for {{ proxmox_mgmt_bridge_ports }}"
      ansible.builtin.command: "ethtool -i {{ proxmox_mgmt_bridge_ports }}"
      register: proxmox_mgmt_driver_info
      changed_when: false

    - name: Resolve management NIC promisc policy for {{ inventory_hostname }}
      ansible.builtin.set_fact:
        proxmox_mgmt_force_promisc_resolved: >-
          {{
            proxmox_mgmt_force_promisc
            if proxmox_mgmt_force_promisc is defined
            else ('driver: mlx5_core' in proxmox_mgmt_driver_info.stdout)
          }}

    - name: "PREFLIGHT: Guard Mellanox mlx5 against oversized VLAN lists"
      ansible.builtin.assert:
        that:
          - proxmox_bridge_vids_resolved | length <= 512
        fail_msg: >-
          {{ inventory_hostname }} uses {{ proxmox_mgmt_bridge_ports }} with the
          mlx5 driver, which can only program 512 VLANs. Resolved bridge VLANs:
          {{ proxmox_bridge_vids_resolved | join(' ') }}
        success_msg: >-
          {{ inventory_hostname }} mlx5 bridge VLAN count is safe:
          {{ proxmox_bridge_vids_resolved | length }}
      when: "'driver: mlx5_core' in proxmox_mgmt_driver_info.stdout"

    - name: "PREFLIGHT: Report management NIC promisc policy"
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} will {{
          'enable' if proxmox_mgmt_force_promisc_resolved else 'not enable'
          }} promisc mode on {{ proxmox_mgmt_bridge_ports }}

    # -----------------------------------------------------------------
    # Deploy network configuration
    # -----------------------------------------------------------------
    - name: Template /etc/network/interfaces
      ansible.builtin.template:
        src: proxmox-interfaces.j2
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: "0644"
        backup: true
      register: interfaces_result

    - name: Apply network changes via ifreload
      ansible.builtin.command: ifreload -a
      changed_when: true
      when: interfaces_result.changed
