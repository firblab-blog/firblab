---
# =============================================================================
# Restic Backup Server Deployment — backup LXC (lab-01)
# =============================================================================
# Deploys the Restic REST server and Backrest monitoring UI on the backup
# LXC container (10.0.10.18, Management VLAN 10, hosted on lab-01).
#
# Architecture:
#   - LXC with bind-mount: /hdd-mirror-0/restic → /mnt/restic (host ZFS)
#   - REST server on 0.0.0.0:8500 (append-only, htpasswd, private-repos)
#   - Backrest on 127.0.0.1:9898 (auth enabled, read-only monitoring)
#   - Each client (lab-02, -03, -04) pushes to its own isolated repo
#   - Append-only: clients cannot delete or modify existing snapshots
#
# Security layers:
#   1. Unprivileged LXC (container isolation from hypervisor)
#   2. UFW on LXC (port-level access control via common role)
#   3. rest-server: append-only + private-repos + htpasswd
#   4. Backrest: auth enabled, behind Traefik + Authentik ForwardAuth
#   5. systemd hardening: ProtectSystem=strict, NoNewPrivileges
#   6. Ansible-managed config (no manual UI changes, secrets from Vault)
#
# Prerequisites:
#   - backup LXC provisioned by Terraform Layer 05 with bind mount
#   - hdd-mirror-0 ZFS pool on lab-01 (proxmox-disk-bootstrap.yml)
#   - Vault accessible from controller
#
# Usage:
#   export VAULT_ADDR=https://10.0.10.10:8200
#   export VAULT_TOKEN=hvs.xxxxx
#   export VAULT_CACERT=~/.lab/tls/ca/ca.pem
#   ansible-playbook -i inventory/hosts.yml playbooks/restic-server-deploy.yml
#
# Verify:
#   curl -u lab-03:<pass> http://10.0.10.18:8500/lab-03/
#   ssh -L 9898:127.0.0.1:9898 root@10.0.10.18
#   # Open http://localhost:9898 → Backrest login
#   systemctl status restic-rest-server backrest  # On backup LXC
# =============================================================================

- name: Deploy Restic backup server (REST server + Backrest)
  hosts: backup
  become: true
  gather_facts: true
  serial: 1

  pre_tasks:
    - name: Wait for host to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Gather system facts
      ansible.builtin.setup:

    # -----------------------------------------------------------------
    # Verify bind mount is available
    # -----------------------------------------------------------------
    - name: Check /mnt/restic bind mount exists
      ansible.builtin.stat:
        path: /mnt/restic
      register: restic_mount_check
      tags: [restic-server, backrest]

    - name: Fail if /mnt/restic is not mounted
      ansible.builtin.fail:
        msg: >
          /mnt/restic bind mount not found. Ensure the backup LXC was
          provisioned with Terraform (terraform apply in Layer 05) and
          the bind mount script ran successfully.
          Verify: pct config 5040 | grep mp0
      when: not restic_mount_check.stat.exists
      tags: [restic-server, backrest]

    # -----------------------------------------------------------------
    # Generate or read Restic credentials from Vault
    # -----------------------------------------------------------------
    - name: Try reading Restic server secrets from Vault
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json backup/restic
      register: vault_restic_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [always]

    - name: Generate Restic credentials (first deploy)
      ansible.builtin.set_fact:
        restic_repo_password: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=32') }}"
        restic_firblab02_pass: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=24') }}"
        restic_firblab03_pass: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=24') }}"
        restic_firblab04_pass: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=24') }}"
      when: vault_restic_read.rc is not defined or vault_restic_read.rc != 0
      no_log: true
      tags: [always]

    - name: Set Restic credentials from Vault (existing)
      ansible.builtin.set_fact:
        restic_repo_password: "{{ (vault_restic_read.stdout | from_json).data.data.repo_password }}"
        restic_firblab02_pass: "{{ (vault_restic_read.stdout | from_json).data.data.firblab02_pass }}"
        restic_firblab03_pass: "{{ (vault_restic_read.stdout | from_json).data.data.firblab03_pass }}"
        restic_firblab04_pass: "{{ (vault_restic_read.stdout | from_json).data.data.firblab04_pass }}"
      when:
        - vault_restic_read.rc is defined
        - vault_restic_read.rc == 0
      no_log: true
      tags: [always]

    - name: Store Restic credentials in Vault (first deploy)
      ansible.builtin.command:
        cmd: >-
          vault kv put -mount=secret backup/restic
          repo_password={{ restic_repo_password }}
          firblab02_pass={{ restic_firblab02_pass }}
          firblab03_pass={{ restic_firblab03_pass }}
          firblab04_pass={{ restic_firblab04_pass }}
      delegate_to: localhost
      become: false
      no_log: true
      when: vault_restic_read.rc is not defined or vault_restic_read.rc != 0
      tags: [always]

    # -----------------------------------------------------------------
    # Generate htpasswd content for REST server
    # -----------------------------------------------------------------
    - name: Install passlib for htpasswd generation
      ansible.builtin.pip:
        name: passlib
        state: present
      delegate_to: localhost
      become: false
      tags: [always]

    - name: Generate htpasswd entries
      ansible.builtin.set_fact:
        restic_server_htpasswd_content: |
          lab-02:{{ restic_firblab02_pass | password_hash('bcrypt') }}
          lab-03:{{ restic_firblab03_pass | password_hash('bcrypt') }}
          lab-04:{{ restic_firblab04_pass | password_hash('bcrypt') }}
      no_log: true
      tags: [always]

    # -----------------------------------------------------------------
    # Generate or read Backrest admin credentials from Vault
    # -----------------------------------------------------------------
    - name: Try reading Backrest secrets from Vault
      ansible.builtin.command:
        cmd: vault kv get -mount=secret -format=json backup/backrest
      register: vault_backrest_read
      delegate_to: localhost
      become: false
      changed_when: false
      failed_when: false
      no_log: true
      tags: [always]

    - name: Check if Backrest secrets exist in Vault
      ansible.builtin.set_fact:
        backrest_vault_has_data: >-
          {{ vault_backrest_read.rc is defined
             and vault_backrest_read.rc == 0
             and (vault_backrest_read.stdout | from_json).data.data is not none
             and (vault_backrest_read.stdout | from_json).data.data.admin_password is defined }}
      tags: [always]

    - name: Generate Backrest admin credentials (first deploy)
      ansible.builtin.set_fact:
        backrest_admin_user: "admin"
        backrest_admin_password: "{{ lookup('ansible.builtin.password', '/dev/null chars=ascii_letters,digits length=24') }}"
      when: not backrest_vault_has_data | bool
      no_log: true
      tags: [always]

    - name: Generate Backrest bcrypt hash (first deploy)
      ansible.builtin.set_fact:
        backrest_admin_password_bcrypt: "{{ backrest_admin_password | password_hash('bcrypt') | b64encode }}"
      when: not backrest_vault_has_data | bool
      no_log: true
      tags: [always]

    - name: Store Backrest credentials in Vault (first deploy)
      ansible.builtin.command:
        argv:
          - vault
          - kv
          - put
          - -mount=secret
          - backup/backrest
          - "admin_user={{ backrest_admin_user }}"
          - "admin_password={{ backrest_admin_password }}"
          - "admin_password_bcrypt={{ backrest_admin_password_bcrypt }}"
      delegate_to: localhost
      become: false
      no_log: true
      when: not backrest_vault_has_data | bool
      tags: [always]

    - name: Set Backrest credentials from Vault (existing)
      ansible.builtin.set_fact:
        backrest_admin_user: "{{ (vault_backrest_read.stdout | from_json).data.data.admin_user }}"
        backrest_admin_password: "{{ (vault_backrest_read.stdout | from_json).data.data.admin_password }}"
        backrest_admin_password_bcrypt: "{{ (vault_backrest_read.stdout | from_json).data.data.admin_password_bcrypt }}"
      when: backrest_vault_has_data | bool
      no_log: true
      tags: [always]

    - name: Display deployment info
      ansible.builtin.debug:
        msg: >
          Deploying backup server on {{ inventory_hostname }}
          (REST server: 0.0.0.0:{{ restic_server_port | default(8500) }},
          Backrest: 127.0.0.1:{{ backrest_port | default(9898) }},
          data: {{ restic_server_data_dir | default('/mnt/restic') }})

  roles:
    - role: common
      tags:
        - common
    - role: restic-server
      tags:
        - restic-server
    - role: backrest
      tags:
        - backrest

  vars:
    restic_server_data_dir: "/mnt/restic"
    # Candidate repos for Backrest monitoring. GUIDs are auto-discovered
    # at deploy time — the backrest role checks which repos are initialized
    # (have a restic config file) and reads their GUIDs automatically.
    # Uninitialized repos are silently skipped.
    backrest_repos:
      - id: "lab-02"
        path: "/mnt/restic/lab-02"
      - id: "lab-03"
        path: "/mnt/restic/lab-03"
      - id: "lab-04"
        path: "/mnt/restic/lab-04"

  post_tasks:
    - name: Create per-client repository directories
      ansible.builtin.file:
        path: "{{ restic_server_data_dir }}/{{ item }}"
        state: directory
        owner: restic
        group: restic
        mode: "0750"
      loop:
        - lab-02
        - lab-03
        - lab-04
      tags: [restic-server]

    # Repos on the ZFS pool may have been initialized by root (old bare-metal
    # setup or first-time restic init via REST API). The rest-server runs as
    # the restic user and needs ownership of all repo contents. This is
    # idempotent — once ownership is correct, chown is a no-op.
    - name: Ensure restic user owns all repository contents
      ansible.builtin.command:
        cmd: "chown -R restic:restic {{ restic_server_data_dir }}/{{ item }}"
      loop:
        - lab-02
        - lab-03
        - lab-04
      changed_when: false
      tags: [restic-server]

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Backup Server Deployed"
          - "=========================================="
          - "Host: {{ inventory_hostname }} ({{ ansible_host }})"
          - "REST Server: http://{{ ansible_host }}:{{ restic_server_port | default(8500) }}/"
          - "Backrest UI: http://127.0.0.1:{{ backrest_port | default(9898) }}/ (SSH tunnel)"
          - "Data: {{ restic_server_data_dir }}"
          - "Append-only: {{ restic_server_append_only | default(true) }}"
          - "Private repos: enabled (per-client isolation)"
          - ""
          - "Backup clients:"
          - "  lab-02: user=lab-02"
          - "  lab-03: user=lab-03"
          - "  lab-04: user=lab-04"
          - ""
          - "Vault secrets:"
          - "  REST server: secret/backup/restic"
          - "  Backrest UI: secret/backup/backrest"
          - ""
          - "Test REST server:"
          - "  curl -u lab-03:<pass> http://{{ ansible_host }}:8500/lab-03/"
          - ""
          - "Access Backrest UI:"
          - "  https://backrest.home.example-lab.org (Authentik SSO)"
          - "=========================================="
      tags: [restic-server, backrest, verify]
