---
# =============================================================================
# ArgoCD Bootstrap Playbook
# =============================================================================
# Installs ArgoCD on the RKE2 cluster and applies the app-of-apps root
# Application that drives all platform deployments via GitOps.
#
# What this playbook does:
#   1. Creates the argocd namespace
#   2. Installs ArgoCD from upstream manifests (CRDs + controllers)
#   3. Waits for ArgoCD server to be ready
#   4. Registers the GitLab repository (http://10.0.10.50)
#   5. Applies the root app-of-apps Application (k8s/argocd/install.yml)
#   6. Verifies all child Applications are created
#
# After this playbook completes, ArgoCD manages the entire platform:
#   Wave 0: MetalLB, Traefik, cert-manager, ESO, Gatekeeper, Longhorn,
#           Prometheus, Loki, Trivy Operator (Helm chart installs)
#   Wave 1: MetalLB config, Traefik Middleware, ClusterIssuer,
#           ClusterSecretStore, Longhorn Middleware, Gatekeeper policies
#   Wave 2: Mealie, SonarQube (workload apps)
#
# Prerequisites:
#   - RKE2 cluster deployed and healthy (rke2-deploy.yml completed)
#   - Vault kubernetes auth configured (vault-k8s-auth.yml completed)
#   - GitLab accessible from cluster nodes at http://10.0.10.50
#   - Vault unsealed + VAULT_TOKEN set in environment
#   - Vault secrets seeded:
#       - secret/services/gitlab (argocd_deploy_username, argocd_deploy_token)
#         Created automatically by Terraform Layer 03-gitlab-config
#       - secret/services/grafana (username, password)
#         vault kv put secret/services/grafana username=admin password=<pw>
#
# Usage (run from repo root):
#   cd ~/repos/firb-lab/firblab
#   ansible-playbook ansible/playbooks/argocd-bootstrap.yml
#
# Tags:
#   --tags install     # Only install ArgoCD
#   --tags repo        # Only configure GitLab repo
#   --tags app         # Only apply root Application
#   --tags verify      # Only run verification checks
# =============================================================================

# ---------------------------------------------------------------------------
# Play 1: Install ArgoCD (on first RKE2 server)
# ---------------------------------------------------------------------------
- name: "ArgoCD | Install ArgoCD on RKE2 cluster"
  hosts: rke2-server-1
  become: true
  gather_facts: false

  vars:
    rke2_bin_dir: "/var/lib/rancher/rke2/bin"
    rke2_data_dir: "/var/lib/rancher/rke2"
    _kubectl: "{{ rke2_bin_dir }}/kubectl"
    _kubeconfig: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"
    argocd_version: "stable"
    argocd_manifests_url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"
    gitlab_repo_url: "http://10.0.10.50/infrastructure/firblab.git"

  pre_tasks:
    - name: Wait for host to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300
      tags:
        - always

    - name: Display configuration
      ansible.builtin.debug:
        msg: >
          Installing ArgoCD ({{ argocd_version }}) on RKE2 cluster.
          GitLab repo: {{ gitlab_repo_url }}
      tags:
        - always

  tasks:
    # --- Create namespace ---

    - name: Create argocd namespace
      ansible.builtin.shell:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          create namespace argocd --dry-run=client -o yaml |
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }} apply -f -
      register: _ns_argocd
      changed_when: "'created' in _ns_argocd.stdout"
      tags:
        - install

    # --- Install ArgoCD ---

    - name: Install ArgoCD from upstream manifests
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          apply -n argocd --server-side --force-conflicts
          -f {{ argocd_manifests_url }}
      register: _argocd_install
      changed_when: "'created' in _argocd_install.stdout or 'serverside-applied' in _argocd_install.stdout"
      tags:
        - install

    - name: Display install result summary
      ansible.builtin.debug:
        msg: "{{ _argocd_install.stdout_lines | select('search', 'created') | list }}"
      when: _argocd_install.stdout_lines | select('search', 'created') | list | length > 0
      tags:
        - install

    # --- Wait for ArgoCD to be ready ---

    - name: Wait for argocd-server deployment to be ready
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd rollout status deploy/argocd-server
          --timeout=180s
      register: _argocd_ready
      changed_when: false
      tags:
        - install

    - name: Wait for argocd-repo-server deployment to be ready
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd rollout status deploy/argocd-repo-server
          --timeout=180s
      register: _repo_server_ready
      changed_when: false
      tags:
        - install

    - name: Wait for argocd-application-controller to be ready
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd rollout status statefulset/argocd-application-controller
          --timeout=180s
      register: _app_controller_ready
      changed_when: false
      tags:
        - install

    - name: ArgoCD is running
      ansible.builtin.debug:
        msg:
          - "ArgoCD installed successfully"
          - "  argocd-server: {{ _argocd_ready.stdout }}"
          - "  argocd-repo-server: {{ _repo_server_ready.stdout }}"
          - "  argocd-application-controller: {{ _app_controller_ready.stdout }}"
      tags:
        - install

# ---------------------------------------------------------------------------
# Play 2: Configure GitLab Repository (on first RKE2 server)
# ---------------------------------------------------------------------------
# Reads deploy token credentials from Vault (delegated to localhost where
# the Vault CLI + token are available), then creates the ArgoCD repository
# Secret with authentication on the RKE2 server.
# ---------------------------------------------------------------------------
- name: "ArgoCD | Configure GitLab repository"
  hosts: rke2-server-1
  become: true
  gather_facts: false

  vars:
    rke2_bin_dir: "/var/lib/rancher/rke2/bin"
    rke2_data_dir: "/var/lib/rancher/rke2"
    _kubectl: "{{ rke2_bin_dir }}/kubectl"
    _kubeconfig: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"
    gitlab_repo_url: "http://10.0.10.50/infrastructure/firblab.git"

  tasks:
    # --- Read GitLab deploy token from Vault ---

    - name: Read GitLab deploy token from Vault
      ansible.builtin.command:
        cmd: vault kv get -format=json secret/services/gitlab
      delegate_to: localhost
      become: false
      register: _vault_gitlab_raw
      changed_when: false
      no_log: true
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
        VAULT_CACERT: "{{ vault_lookup_ca_cert | expanduser }}"
      tags:
        - repo

    - name: Parse GitLab credentials
      ansible.builtin.set_fact:
        _gitlab_deploy_username: "{{ (_vault_gitlab_raw.stdout | from_json).data.data.argocd_deploy_username }}"
        _gitlab_deploy_token: "{{ (_vault_gitlab_raw.stdout | from_json).data.data.argocd_deploy_token }}"
      no_log: true
      tags:
        - repo

    - name: Credentials retrieved from Vault
      ansible.builtin.debug:
        msg: "GitLab deploy token retrieved for user: {{ _gitlab_deploy_username }}"
      tags:
        - repo

    # --- Create ArgoCD repository Secret with authentication ---

    - name: Write ArgoCD repository Secret manifest
      ansible.builtin.copy:
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: repo-firblab
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
              app.kubernetes.io/managed-by: ansible
          type: Opaque
          stringData:
            type: git
            url: "{{ gitlab_repo_url }}"
            username: "{{ _gitlab_deploy_username }}"
            password: "{{ _gitlab_deploy_token }}"
            insecure: "true"
        dest: /tmp/argocd-repo-secret.yaml
        owner: root
        group: root
        mode: "0600"
      no_log: true
      tags:
        - repo

    - name: Apply ArgoCD repository Secret
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          apply -f /tmp/argocd-repo-secret.yaml
      register: _repo_apply
      changed_when: "'configured' in _repo_apply.stdout or 'created' in _repo_apply.stdout"
      tags:
        - repo

    - name: Clean up temp manifest
      ansible.builtin.file:
        path: /tmp/argocd-repo-secret.yaml
        state: absent
      tags:
        - repo

    - name: GitLab repository registered
      ansible.builtin.debug:
        msg: "ArgoCD repository configured: {{ gitlab_repo_url }} (authenticated via deploy token)"
      tags:
        - repo

# ---------------------------------------------------------------------------
# Play 3: Apply Root App-of-Apps (on first RKE2 server)
# ---------------------------------------------------------------------------
- name: "ArgoCD | Apply root Application"
  hosts: rke2-server-1
  become: true
  gather_facts: false

  vars:
    rke2_bin_dir: "/var/lib/rancher/rke2/bin"
    rke2_data_dir: "/var/lib/rancher/rke2"
    _kubectl: "{{ rke2_bin_dir }}/kubectl"
    _kubeconfig: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"
    # Path to install.yml on the RKE2 node — we copy it there
    _install_manifest_src: "{{ playbook_dir }}/../../k8s/argocd/install.yml"

  tasks:
    - name: Copy install.yml to RKE2 server
      ansible.builtin.copy:
        src: "{{ _install_manifest_src }}"
        dest: /tmp/argocd-install.yml
        owner: root
        group: root
        mode: "0600"
      tags:
        - app

    - name: Apply root app-of-apps Application
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          apply -f /tmp/argocd-install.yml
      register: _root_app_apply
      changed_when: "'configured' in _root_app_apply.stdout or 'created' in _root_app_apply.stdout"
      tags:
        - app

    - name: Display root app result
      ansible.builtin.debug:
        msg: "{{ _root_app_apply.stdout_lines }}"
      tags:
        - app

    - name: Clean up temp manifest
      ansible.builtin.file:
        path: /tmp/argocd-install.yml
        state: absent
      tags:
        - app

    # --- Wait for root app to sync ---

    - name: Wait for root Application to be synced
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd get application root
          -o jsonpath='{.status.sync.status}'
      register: _root_sync
      retries: 30
      delay: 10
      until: _root_sync.stdout == 'Synced'
      changed_when: false
      tags:
        - app

    - name: Root app synced
      ansible.builtin.debug:
        msg: "Root Application sync status: {{ _root_sync.stdout }}"
      tags:
        - app

# ---------------------------------------------------------------------------
# Play 4: Verify ArgoCD and child Applications
# ---------------------------------------------------------------------------
- name: "ArgoCD | Verify deployment"
  hosts: rke2-server-1
  become: true
  gather_facts: false

  vars:
    rke2_bin_dir: "/var/lib/rancher/rke2/bin"
    rke2_data_dir: "/var/lib/rancher/rke2"
    _kubectl: "{{ rke2_bin_dir }}/kubectl"
    _kubeconfig: "{{ rke2_data_dir }}/server/cred/admin.kubeconfig"

  tasks:
    - name: List all ArgoCD Applications
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd get applications
          -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status
      register: _all_apps
      changed_when: false
      tags:
        - verify

    - name: Count child Applications
      ansible.builtin.command:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd get applications --no-headers
          -o custom-columns=NAME:.metadata.name
      register: _app_count
      changed_when: false
      tags:
        - verify

    - name: Get ArgoCD server initial admin password
      ansible.builtin.shell:
        cmd: >-
          {{ _kubectl }} --kubeconfig {{ _kubeconfig }}
          -n argocd get secret argocd-initial-admin-secret
          -o jsonpath='{.data.password}' | base64 -d
      register: _argocd_password
      changed_when: false
      no_log: true
      tags:
        - verify

    - name: Display ArgoCD deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "ArgoCD Bootstrap: COMPLETE"
          - "=========================================="
          - ""
          - "Applications ({{ _app_count.stdout_lines | length }}):"
          - "{{ _all_apps.stdout }}"
          - ""
          - "ArgoCD UI access:"
          - "  1. Port forward: kubectl -n argocd port-forward svc/argocd-server 8080:443"
          - "  2. Open: https://localhost:8080"
          - "  3. Login: admin / {{ _argocd_password.stdout }}"
          - ""
          - "ArgoCD manages all platform services via sync waves:"
          - "  Wave 0: Helm chart installs (controllers)"
          - "  Wave 1: Post-install CRD configs"
          - "  Wave 2: Workload applications"
          - ""
          - "Monitor: kubectl -n argocd get applications -w"
          - "=========================================="
      tags:
        - verify
