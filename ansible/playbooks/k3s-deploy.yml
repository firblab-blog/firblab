---
# =============================================================================
# K3s Cluster Deployment Playbook
# =============================================================================
# Deploys a CIS-hardened K3s Kubernetes cluster on 3 RPi5 bare-metal nodes.
# 3 server (control plane) nodes on Services VLAN 20 — all servers run
# workloads (server taint removed in Play 5).
#
# Prerequisites:
#   - RPi5 nodes bootstrapped via k3s-rpi-bootstrap.yml
#     (Ubuntu 24.04 on NVMe, static IPs, admin user, common+hardening applied)
#   - SSH keys available (~/.ssh/id_ed25519_k3s-server-*)
#   - Vault running and accessible (for token backup)
#   - Switch ports assigned to Services VLAN 20 via Terraform Layer 00
#
# Deployment order (critical for HA cluster bootstrap):
#   1. ALL nodes: prerequisites + hardening (parallel)
#   2. First server (k3s-server-1): cluster-init (serial: 1)
#   3. Remaining servers: join cluster (serial: 1)
#   4. All agents: join cluster (placeholder — no agents today)
#   5. Post-deploy: remove server taints, label nodes, verify health
#
# Usage (run from repo root):
#   cd ~/repos/firblab
#   ansible-playbook ansible/playbooks/k3s-deploy.yml
#
# Tags:
#   --tags prerequisites    # Only run prerequisite setup
#   --tags hardening        # Only run CIS hardening configs
#   --tags install          # Only run K3s install + start
#   --tags configure        # Only run config-related tasks (server config + CoreDNS)
#   --tags coredns          # Only deploy CoreDNS custom zone config
#   --tags verify           # Only run verification checks
# =============================================================================

# ---------------------------------------------------------------------------
# Play 1: Prerequisites + Hardening (all K3s nodes, parallel)
# ---------------------------------------------------------------------------
- name: "K3s | Prerequisites and hardening (all nodes)"
  hosts: k3s_cluster
  become: true
  gather_facts: false

  pre_tasks:
    - name: Wait for hosts to be reachable
      ansible.builtin.wait_for_connection:
        timeout: 300
      tags:
        - always

    - name: Gather system facts
      ansible.builtin.setup:
      tags:
        - always

    - name: Display deployment info
      ansible.builtin.debug:
        msg: >
          Preparing {{ inventory_hostname }}
          (role={{ k3s_role }}, os={{ ansible_os_family }},
          arch={{ ansible_architecture }}, ip={{ ansible_host }})
      tags:
        - always

  roles:
    # Baseline system config + firewall (SSH hardening, fail2ban, UFW, packages)
    - role: common
      tags:
        - common
        - firewall

    # CIS L1 hardening (sysctl, kernel modules, audit, AppArmor, AIDE)
    # RPi5 bare-metal nodes get full hardening (not LXC)
    - role: hardening
      tags:
        - hardening

  tasks:
    # K3s-specific prerequisites (kernel modules, sysctl, swap, etcd user)
    - name: Run K3s prerequisites
      ansible.builtin.include_role:
        name: k3s
        tasks_from: prerequisites.yml
      tags:
        - prerequisites
        - k3s

    # Deploy CIS configs (audit policy, encryption config) before install
    - name: Run K3s CIS hardening
      ansible.builtin.include_role:
        name: k3s
        tasks_from: hardening.yml
      tags:
        - hardening
        - k3s

# ---------------------------------------------------------------------------
# Play 2: First server — cluster-init (serial: 1)
# ---------------------------------------------------------------------------
- name: "K3s | Initialize cluster (first server)"
  hosts: k3s-server-1
  become: true
  gather_facts: false
  serial: 1

  tasks:
    - name: Install and start K3s server (cluster-init)
      ansible.builtin.include_role:
        name: k3s
        tasks_from: install-server.yml
      tags:
        - install
        - configure
        - coredns
        - k3s

    # Read the K3s-generated node-token (full format: K10<ca-hash>::server:<password>).
    # The CA hash in this token lets joining nodes verify the server's self-signed
    # TLS cert. Our plain random token in cluster-token does NOT contain this hash,
    # which causes "certificate signed by unknown authority" on join.
    - name: Read K3s node-token (includes CA hash for TLS verification)
      ansible.builtin.slurp:
        src: "{{ k3s_data_dir | default('/var/lib/rancher/k3s') }}/server/node-token"
      register: _k3s_node_token_raw
      no_log: true
      tags:
        - install

    - name: Set cluster token fact for sharing
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ _k3s_node_token_raw.content | b64decode | trim }}"
        cacheable: true
      no_log: true
      tags:
        - install

# ---------------------------------------------------------------------------
# Play 3: Remaining servers — join cluster (serial: 1)
# ---------------------------------------------------------------------------
- name: "K3s | Join remaining servers to cluster"
  hosts: k3s_servers:!k3s-server-1
  become: true
  gather_facts: false
  serial: 1

  pre_tasks:
    - name: Retrieve cluster token from first server
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ hostvars['k3s-server-1']['k3s_cluster_token'] }}"
      no_log: true
      tags:
        - install

  tasks:
    - name: Install and start K3s server (join)
      ansible.builtin.include_role:
        name: k3s
        tasks_from: install-server.yml
      tags:
        - install
        - configure
        - coredns
        - k3s

# ---------------------------------------------------------------------------
# Play 4: All agents — join cluster (placeholder for future use)
# ---------------------------------------------------------------------------
# Currently no agent nodes. When expanding the cluster with dedicated
# worker nodes, add them to the k3s_agents inventory group and this
# play will install K3s agent on them.
- name: "K3s | Join agent nodes to cluster"
  hosts: k3s_agents
  become: true
  gather_facts: false

  pre_tasks:
    - name: Retrieve cluster token from first server
      ansible.builtin.set_fact:
        k3s_cluster_token: "{{ hostvars['k3s-server-1']['k3s_cluster_token'] }}"
      no_log: true
      tags:
        - install

  tasks:
    - name: Install and start K3s agent
      ansible.builtin.include_role:
        name: k3s
        tasks_from: install-agent.yml
      tags:
        - install
        - k3s

# ---------------------------------------------------------------------------
# Play 5: Post-deploy — remove taints, label nodes, verify health
# ---------------------------------------------------------------------------
- name: "K3s | Post-deploy verification and node configuration"
  hosts: k3s-server-1
  become: true
  gather_facts: false

  tasks:
    # Remove server taint so workloads schedule on all 3 nodes.
    # With 3 servers and no dedicated agents, all nodes run workloads.
    - name: Remove server NoSchedule taint from all server nodes
      ansible.builtin.command:
        cmd: >-
          {{ k3s_bin_dir | default('/usr/local/bin') }}/kubectl
          --kubeconfig {{ k3s_config_dir | default('/etc/rancher/k3s') }}/k3s.yaml
          taint node {{ item }} node-role.kubernetes.io/master:NoSchedule- --ignore-not-found
      loop: "{{ groups['k3s_servers'] }}"
      changed_when: true
      failed_when: false
      tags:
        - post-deploy

    # Also remove control-plane taint (K8s 1.24+ uses this label)
    - name: Remove control-plane NoSchedule taint from all server nodes
      ansible.builtin.command:
        cmd: >-
          {{ k3s_bin_dir | default('/usr/local/bin') }}/kubectl
          --kubeconfig {{ k3s_config_dir | default('/etc/rancher/k3s') }}/k3s.yaml
          taint node {{ item }} node-role.kubernetes.io/control-plane:NoSchedule- --ignore-not-found
      loop: "{{ groups['k3s_servers'] }}"
      changed_when: true
      failed_when: false
      tags:
        - post-deploy

    # Label nodes with RAM tier for scheduling hints
    - name: Label 4GB node for resource-aware scheduling
      ansible.builtin.command:
        cmd: >-
          {{ k3s_bin_dir | default('/usr/local/bin') }}/kubectl
          --kubeconfig {{ k3s_config_dir | default('/etc/rancher/k3s') }}/k3s.yaml
          label node {{ item }} example-lab.org/ram-tier=small --overwrite
      loop: "{{ groups['k3s_servers'] | select('equalto', 'k3s-server-3') | list }}"
      changed_when: true
      tags:
        - post-deploy

    - name: Label 8GB nodes for resource-aware scheduling
      ansible.builtin.command:
        cmd: >-
          {{ k3s_bin_dir | default('/usr/local/bin') }}/kubectl
          --kubeconfig {{ k3s_config_dir | default('/etc/rancher/k3s') }}/k3s.yaml
          label node {{ item }} example-lab.org/ram-tier=standard --overwrite
      loop: "{{ groups['k3s_servers'] | reject('equalto', 'k3s-server-3') | list }}"
      changed_when: true
      tags:
        - post-deploy

    # Run verification checks
    - name: Run cluster verification
      ansible.builtin.include_role:
        name: k3s
        tasks_from: verify.yml
      tags:
        - verify
        - coredns
        - k3s

    # Fetch flattened kubeconfig (embeds certs inline for local Mac access).
    # K3s's k3s.yaml uses localhost:6443. We need to rewrite it with the
    # actual server IP so kubectl works from the workstation.
    - name: Read kubeconfig from server
      ansible.builtin.slurp:
        src: "{{ k3s_config_dir | default('/etc/rancher/k3s') }}/k3s.yaml"
      register: _k3s_kubeconfig_raw
      tags:
        - post-deploy

    - name: Ensure ~/.kube directory exists on localhost
      ansible.builtin.file:
        path: ~/.kube
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false
      tags:
        - post-deploy

    - name: Write kubeconfig to localhost
      ansible.builtin.copy:
        content: "{{ _k3s_kubeconfig_raw.content | b64decode }}"
        dest: ~/.kube/k3s-config
        mode: "0600"
      delegate_to: localhost
      become: false
      tags:
        - post-deploy

    - name: Update kubeconfig server address for external access
      ansible.builtin.replace:
        path: ~/.kube/k3s-config
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ k3s_init_node_ip }}:6443"
      delegate_to: localhost
      become: false
      tags:
        - post-deploy

    # Write a tunnel-mode kubeconfig that keeps 127.0.0.1:6443 for use
    # with SSH -L tunnels through the Proxmox jump host.
    - name: Write tunnel-mode kubeconfig to localhost
      ansible.builtin.copy:
        content: "{{ _k3s_kubeconfig_raw.content | b64decode }}"
        dest: ~/.kube/k3s-config-tunnel
        mode: "0600"
      delegate_to: localhost
      become: false
      tags:
        - post-deploy

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "K3s Cluster Deployment Complete"
          - "=========================================="
          - "Version: {{ k3s_version }}"
          - "Flannel backend: {{ k3s_flannel_backend }}"
          - "Pod CIDR: {{ k3s_cluster_cidr }}"
          - "Service CIDR: {{ k3s_service_cidr }}"
          - "Servers: {{ groups['k3s_servers'] | join(', ') }}"
          - ""
          - "Kubeconfig (direct):  ~/.kube/k3s-config"
          - "Kubeconfig (tunnel):  ~/.kube/k3s-config-tunnel"
          - ""
          - "Direct access (if inter-VLAN routing works):"
          - "  export KUBECONFIG=~/.kube/k3s-config"
          - "  kubectl get nodes"
          - ""
          - "Tunnel access (reliable, via Proxmox jump host):"
          - "  ssh -L 6443:{{ k3s_init_node_ip }}:6443 -i ~/.ssh/id_ed25519_lab-01 -o IdentitiesOnly=yes admin@10.0.10.42 -N &"
          - "  export KUBECONFIG=~/.kube/k3s-config-tunnel"
          - "  kubectl get nodes"
          - ""
          - "CIS Controls:"
          - "  - protect-kernel-defaults: true"
          - "  - secrets-encryption: true"
          - "  - Audit logging: enabled"
          - "  - Pod Security Standards: restricted (manual)"
          - "=========================================="
      tags:
        - verify
