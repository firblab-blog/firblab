---
# =============================================================================
# K3s Platform Prerequisites Deployment
# =============================================================================
# Installs platform services on the K3s RPi5 cluster via Helm + kubectl.
# Runs from the Mac workstation using the K3s kubeconfig.
#
# Install order (dependency-driven):
#   1. MetalLB (LoadBalancer IP allocation)
#   2. cert-manager + CRDs (TLS certificate management)
#   3. External Secrets Operator (Vault → K8s secret sync)
#   4. ClusterSecretStore + ExternalSecrets (wait for sync)
#   5. cert-manager ClusterIssuers (depend on Cloudflare token from ESO)
#   6. Traefik (ingress controller, depends on MetalLB for LB VIP)
#   7. Traefik middlewares (security headers, Authentik ForwardAuth)
#
# Prerequisites:
#   - K3s cluster deployed (k3s-deploy.yml)
#   - Vault kubernetes-k3s auth configured (k3s-vault-k8s-auth.yml)
#   - Kubeconfig at ~/.kube/k3s-config
#
# Usage:
#   ansible-playbook ansible/playbooks/k3s-platform-deploy.yml
# =============================================================================

- name: Deploy platform services on K3s RPi5 cluster
  hosts: localhost
  connection: local
  become: false
  gather_facts: false

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/k3s-config"
    k3s_platform_dir: "{{ playbook_dir }}/../../k8s/k3s-platform"

  tasks:
    # =========================================================================
    # 1. MetalLB — LoadBalancer IP allocation
    # =========================================================================
    - name: Add MetalLB Helm repo
      ansible.builtin.command:
        cmd: helm repo add metallb https://metallb.github.io/metallb
      register: _helm_repo_metallb
      changed_when: "'has been added' in _helm_repo_metallb.stdout"
      failed_when: _helm_repo_metallb.rc != 0 and 'already exists' not in _helm_repo_metallb.stderr
      tags: [metallb]

    - name: Install MetalLB
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install metallb metallb/metallb
          --namespace metallb-system --create-namespace
          --kubeconfig {{ kubeconfig }}
          --wait --timeout 5m
      register: _metallb_install
      changed_when: "'has been upgraded' in _metallb_install.stdout or 'has been installed' in _metallb_install.stdout"
      tags: [metallb]

    - name: Wait for MetalLB controller to be ready
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=ready pod
          -l app.kubernetes.io/component=controller
          -n metallb-system
          --kubeconfig {{ kubeconfig }}
          --timeout=120s
      changed_when: false
      tags: [metallb]

    - name: Apply MetalLB IP pool and L2 advertisement
      ansible.builtin.command:
        cmd: kubectl apply -f {{ k3s_platform_dir }}/metallb/config.yaml --kubeconfig {{ kubeconfig }}
      register: _metallb_config
      changed_when: "'created' in _metallb_config.stdout or 'configured' in _metallb_config.stdout"
      tags: [metallb]

    # =========================================================================
    # 2. cert-manager — TLS certificate management
    # =========================================================================
    - name: Add Jetstack Helm repo
      ansible.builtin.command:
        cmd: helm repo add jetstack https://charts.jetstack.io
      register: _helm_repo_jetstack
      changed_when: "'has been added' in _helm_repo_jetstack.stdout"
      failed_when: _helm_repo_jetstack.rc != 0 and 'already exists' not in _helm_repo_jetstack.stderr
      tags: [cert-manager]

    - name: Install cert-manager with CRDs
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install cert-manager jetstack/cert-manager
          --namespace cert-manager --create-namespace
          --set crds.enabled=true
          --kubeconfig {{ kubeconfig }}
          --wait --timeout 5m
      register: _certmgr_install
      changed_when: "'has been upgraded' in _certmgr_install.stdout or 'has been installed' in _certmgr_install.stdout"
      tags: [cert-manager]

    # =========================================================================
    # 3. External Secrets Operator — Vault → K8s secret sync
    # =========================================================================
    - name: Add External Secrets Helm repo
      ansible.builtin.command:
        cmd: helm repo add external-secrets https://charts.external-secrets.io
      register: _helm_repo_eso
      changed_when: "'has been added' in _helm_repo_eso.stdout"
      failed_when: _helm_repo_eso.rc != 0 and 'already exists' not in _helm_repo_eso.stderr
      tags: [external-secrets]

    - name: Install External Secrets Operator
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install external-secrets external-secrets/external-secrets
          --namespace external-secrets --create-namespace
          --kubeconfig {{ kubeconfig }}
          --wait --timeout 5m
      register: _eso_install
      changed_when: "'has been upgraded' in _eso_install.stdout or 'has been installed' in _eso_install.stdout"
      tags: [external-secrets]

    # =========================================================================
    # 4. ClusterSecretStore + ExternalSecrets
    # =========================================================================
    - name: Apply ClusterSecretStore (Vault backend)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ k3s_platform_dir }}/external-secrets/cluster-secret-store.yaml --kubeconfig {{ kubeconfig }}
      register: _css_apply
      changed_when: "'created' in _css_apply.stdout or 'configured' in _css_apply.stdout"
      tags: [external-secrets]

    - name: Create monitoring namespace
      ansible.builtin.command:
        cmd: kubectl create namespace monitoring --kubeconfig {{ kubeconfig }}
      register: _ns_monitoring
      changed_when: _ns_monitoring.rc == 0
      failed_when: _ns_monitoring.rc != 0 and 'already exists' not in _ns_monitoring.stderr
      tags: [external-secrets]

    - name: Apply Cloudflare API token ExternalSecret (cert-manager)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ k3s_platform_dir }}/cert-manager/cloudflare-external-secret.yaml --kubeconfig {{ kubeconfig }}
      register: _cf_es
      changed_when: "'created' in _cf_es.stdout or 'configured' in _cf_es.stdout"
      tags: [external-secrets]

    - name: Apply monitoring ExternalSecrets (Grafana admin, OIDC, Alertmanager)
      ansible.builtin.command:
        cmd: kubectl apply -f {{ item }} --kubeconfig {{ kubeconfig }}
      loop:
        - "{{ k3s_platform_dir }}/external-secrets/grafana-admin-credentials.yaml"
        - "{{ k3s_platform_dir }}/external-secrets/grafana-oidc.yaml"
        - "{{ k3s_platform_dir }}/external-secrets/alertmanager-gotify.yaml"
      register: _mon_es
      changed_when: "'created' in _mon_es.stdout or 'configured' in _mon_es.stdout"
      tags: [external-secrets]

    - name: Wait for ExternalSecrets to sync (up to 2 minutes)
      ansible.builtin.command:
        cmd: >-
          kubectl wait --for=condition=Ready externalsecret --all
          -n {{ item }}
          --kubeconfig {{ kubeconfig }}
          --timeout=120s
      loop:
        - cert-manager
        - monitoring
      changed_when: false
      tags: [external-secrets]

    # =========================================================================
    # 5. cert-manager ClusterIssuers (depend on Cloudflare token from ESO)
    # =========================================================================
    - name: Apply cert-manager ClusterIssuers
      ansible.builtin.command:
        cmd: kubectl apply -f {{ item }} --kubeconfig {{ kubeconfig }}
      loop:
        - "{{ k3s_platform_dir }}/cert-manager/cluster-issuer.yaml"
        - "{{ k3s_platform_dir }}/cert-manager/letsencrypt-issuer.yaml"
      register: _issuers
      changed_when: "'created' in _issuers.stdout or 'configured' in _issuers.stdout"
      tags: [cert-manager]

    # =========================================================================
    # 6. Traefik — Ingress controller
    # =========================================================================
    - name: Add Traefik Helm repo
      ansible.builtin.command:
        cmd: helm repo add traefik https://traefik.github.io/charts
      register: _helm_repo_traefik
      changed_when: "'has been added' in _helm_repo_traefik.stdout"
      failed_when: _helm_repo_traefik.rc != 0 and 'already exists' not in _helm_repo_traefik.stderr
      tags: [traefik]

    - name: Install Traefik
      ansible.builtin.command:
        cmd: >-
          helm upgrade --install traefik traefik/traefik
          --namespace traefik --create-namespace
          --values {{ k3s_platform_dir }}/traefik/helm/values.yaml
          --kubeconfig {{ kubeconfig }}
          --wait --timeout 5m
      register: _traefik_install
      changed_when: "'has been upgraded' in _traefik_install.stdout or 'has been installed' in _traefik_install.stdout"
      tags: [traefik]

    # =========================================================================
    # 7. Traefik middlewares
    # =========================================================================
    - name: Apply Traefik middlewares
      ansible.builtin.command:
        cmd: kubectl apply -f {{ item }} --kubeconfig {{ kubeconfig }}
      loop:
        - "{{ k3s_platform_dir }}/traefik/manifests/default-headers.yaml"
        - "{{ k3s_platform_dir }}/traefik/manifests/authentik-forwardauth.yaml"
      register: _traefik_mw
      changed_when: "'created' in _traefik_mw.stdout or 'configured' in _traefik_mw.stdout"
      tags: [traefik]

    # =========================================================================
    # Summary
    # =========================================================================
    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "K3s Platform Prerequisites Deployed"
          - "=========================================="
          - ""
          - "MetalLB:          IP pool 10.0.20.200-219"
          - "cert-manager:     CRDs installed, ClusterIssuers applied"
          - "ESO:              ClusterSecretStore → Vault (kubernetes-k3s)"
          - "Traefik:          LoadBalancer VIP from MetalLB pool"
          - ""
          - "Verify:"
          - "  kubectl get pods -A --kubeconfig {{ kubeconfig }}"
          - "  kubectl get svc traefik -n traefik --kubeconfig {{ kubeconfig }}"
          - "  kubectl get externalsecrets -A --kubeconfig {{ kubeconfig }}"
          - "  kubectl get clusterissuers --kubeconfig {{ kubeconfig }}"
          - ""
          - "Next: ansible-playbook ansible/playbooks/k3s-monitoring-deploy.yml"
