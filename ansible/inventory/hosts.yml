---
all:
  children:
    # ---------------------------------------------------------------------------
    # Proxmox Hypervisors
    # ---------------------------------------------------------------------------
    # These IPs are on Management VLAN 10 (10.0.10.0/24).
    # Before first use, migrate hosts from the old network using:
    #   ./scripts/migrate-to-vlan.sh <old-ip> <target-ip> <user> <ssh_key>
    # See DEPLOYMENT.md Phase 1.3 for details.
    #
    # SSH keys: Each host has a dedicated key (~/.ssh/id_ed25519_lab-*).
    # Set per-host via ansible_ssh_private_key_file below.
    # Proxmox nodes use admin user after bootstrap (root SSH is disabled).
    # The bootstrap playbook (proxmox-bootstrap.yml) overrides ansible_user
    # to root for initial setup, then switches to admin for hardening.
    proxmox_nodes:
      hosts:
        lab-01:
          ansible_host: 10.0.10.42
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-01
          proxmox_node_name: lab-01
          # proxmox_mgmt_bridge_ports: moved to host_vars/lab-01.yml (Mellanox CX4121C)
        lab-02:
          ansible_host: 10.0.10.2
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-02
          proxmox_node_name: lab-02
          proxmox_mgmt_bridge_ports: nic0
        lab-03:
          ansible_host: 10.0.10.3
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-03
          proxmox_node_name: lab-03
          proxmox_mgmt_bridge_ports: nic0
        lab-04:
          ansible_host: 10.0.10.4
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-04
          proxmox_node_name: lab-04
          proxmox_mgmt_bridge_ports: nic0

    # ---------------------------------------------------------------------------
    # HashiCorp Vault Cluster (Integrated Raft Storage)
    # ---------------------------------------------------------------------------
    vault_cluster:
      hosts:
        vault-1:
          ansible_host: 10.0.10.10
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-macmini
          vault_node_id: vault-1
          vault_node_description: "Mac Mini M4 (macOS native, ARM64)"
        vault-2:
          ansible_host: 10.0.50.2
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_vault-2
          vault_node_id: vault-2
          vault_node_description: "Proxmox VM (Rocky Linux 9 x86_64)"
        vault-3:
          ansible_host: 10.0.10.13
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-rpi5
          vault_node_id: vault-3
          vault_node_description: "Raspberry Pi 5 (Ubuntu 24.04 ARM64)"

    # ---------------------------------------------------------------------------
    # Physical Hosts (bare-metal / special purpose)
    # ---------------------------------------------------------------------------
    # Mac Mini macOS host (10.0.10.10):
    #   Physical Apple Silicon host running macOS 15+. Hardened via
    #   ansible/playbooks/macos-bootstrap.yml (SSH, pf firewall).
    #   Runs vault-1 natively as a LaunchDaemon (no VM).
    # RPi5 (10.0.10.13): Migrated to VLAN 10 via scripts/migrate-to-vlan.sh
    macmini:
      hosts:
        lab-macmini:
          ansible_host: 10.0.10.10
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-macmini

    # macOS hosts — targeted by macos-bootstrap.yml
    macos_hosts:
      hosts:
        lab-macmini: {}

    rpi:
      hosts:
        lab-rpi:
          ansible_host: 10.0.10.13
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-rpi5
        lab-08:
          ansible_host: 10.0.4.20
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-08

    # ---------------------------------------------------------------------------
    # Core Infrastructure Services
    # ---------------------------------------------------------------------------
    core_infra:
      hosts:
        gitlab:
          ansible_host: 10.0.10.50
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_gitlab
        gitlab-runner:
          ansible_host: 10.0.10.51
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_gitlab-runner
          # CI containers on Docker bridge need to SSH back to this host
          firewall_extra_ssh_sources: ["172.17.0.0/16"]
        authentik:
          ansible_host: 10.0.10.16
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/authentik_ssh_key
        # wazuh:  # Removed — lab-02 doesn't have enough RAM (16GB)
        #   ansible_host: 10.0.10.52
        #   ansible_user: admin
        #   ansible_ssh_private_key_file: ~/.ssh/id_ed25519_wazuh

    # ---------------------------------------------------------------------------
    # RKE2 Kubernetes Cluster (DISA STIG-hardened, Services VLAN 20)
    # ---------------------------------------------------------------------------
    # Provisioned by Terraform Layer 04.
    # SSH keys are Terraform-generated: terraform/layers/04-rke2-cluster/.secrets/
    rke2_cluster:
      children:
        rke2_servers:
          hosts:
            rke2-server-1:
              ansible_host: 10.0.20.40
              ansible_user: admin
              ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/04-rke2-cluster/.secrets/rke2-server-1_ssh_key
              rke2_role: server
            rke2-server-2:
              ansible_host: 10.0.20.41
              ansible_user: admin
              ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/04-rke2-cluster/.secrets/rke2-server-2_ssh_key
              rke2_role: server
            rke2-server-3:
              ansible_host: 10.0.20.42
              ansible_user: admin
              ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/04-rke2-cluster/.secrets/rke2-server-3_ssh_key
              rke2_role: server
        rke2_agents:
          hosts:
            rke2-agent-1:
              ansible_host: 10.0.20.50
              ansible_user: admin
              ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/04-rke2-cluster/.secrets/rke2-agent-1_ssh_key
              rke2_role: agent
            rke2-agent-2:
              ansible_host: 10.0.20.51
              ansible_user: admin
              ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/04-rke2-cluster/.secrets/rke2-agent-2_ssh_key
              rke2_role: agent

    # ---------------------------------------------------------------------------
    # K3s Kubernetes Cluster (RPi5 bare-metal, Services VLAN 20)
    # ---------------------------------------------------------------------------
    # 3x RPi5 (2x 8GB, 1x 4GB) with NVMe boot, Ubuntu 24.04 Server ARM64.
    # Independent cluster from RKE2 — different pod/service CIDRs
    # (10.44.0.0/16 pods, 10.45.0.0/16 services vs RKE2's 10.42/10.43).
    # All 3 are servers (HA etcd quorum), all run workloads (taints removed).
    # SSH keys: per-host (~/.ssh/id_ed25519_lab-0X).
    # Bootstrap: k3s-rpi-bootstrap.yml (WiFi → wired → static IP → harden).
    k3s_cluster:
      children:
        k3s_servers:
          hosts:
            k3s-server-1:
              ansible_host: 10.0.20.60
              ansible_user: admin
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-05
              k3s_role: server
            k3s-server-2:
              ansible_host: 10.0.20.61
              ansible_user: admin
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-06
              k3s_role: server
            k3s-server-3:
              ansible_host: 10.0.20.62
              ansible_user: admin
              ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-07
              k3s_role: server
        # k3s_agents: reserved for future expansion with dedicated worker nodes

    # ---------------------------------------------------------------------------
    # Standalone Services (lab-03 + lab-04, Services VLAN 20)
    # ---------------------------------------------------------------------------
    # LXC containers and VMs provisioned by Terraform Layer 05.
    # SSH keys are Terraform-generated: terraform/layers/05-standalone-services/.secrets/
    # LXC containers use root; VMs use admin (Packer template user).
    standalone_services:
      hosts:
        ghost:
          ansible_host: 10.0.20.10
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/ghost_ssh_key
          container_vm_id: 5010
        roundcube:
          ansible_host: 10.0.20.11
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/roundcube_ssh_key
          container_vm_id: 5013
        foundryvtt:
          ansible_host: 10.0.20.12
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/foundryvtt_ssh_key
        mealie:
          ansible_host: 10.0.20.13
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/mealie_ssh_key
          container_vm_id: 5014
        netbox:
          ansible_host: 10.0.20.14
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/netbox_ssh_key
        patchmon:
          ansible_host: 10.0.20.15
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/patchmon_ssh_key
        actualbudget:
          ansible_host: 10.0.20.16
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/actualbudget_ssh_key
          container_vm_id: 5015
        changedetection:
          ansible_host: 10.0.20.17
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/changedetection_ssh_key
          container_vm_id: 5016
        # archive: removed — migrating to dedicated ZimaBlade 7700 (not a Proxmox VM)
        # ai-gpu: REMOVED 2026-02-25 — VM 5035 destroyed (GPU fan runaway)
        vaultwarden:
          ansible_host: 10.0.20.19
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/vaultwarden_ssh_key
          container_vm_id: 5036
        freshrss:
          ansible_host: 10.0.20.21
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/freshrss_ssh_key
          container_vm_id: 5043
        war:
          ansible_host: 10.0.20.22
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/war_ssh_key
        sonarqube:
          ansible_host: 10.0.20.18
          ansible_user: admin
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/sonarqube_ssh_key

    # ---------------------------------------------------------------------------
    # Archive Appliance (ZimaBlade 7700, Services VLAN 20)
    # ---------------------------------------------------------------------------
    # Dedicated bare-metal archive device (NOT a Proxmox VM). Prepper-grade
    # offline knowledge base: Kiwix, ArchiveBox, BookStack, Stirling PDF,
    # Wallabag, FileBrowser. ZimaBlade 7700: Intel E3950, 16GB DDR3L.
    # Storage: 2TB USB SSD + PS4 HDD + optional NFS to TrueNAS.
    archive_appliance:
      hosts:
        archive:
          ansible_host: 10.0.20.20
          ansible_user: admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_archive

    # ---------------------------------------------------------------------------
    # TrueNAS (bare-metal, Storage VLAN 40)
    # ---------------------------------------------------------------------------
    # Physical TrueNAS SCALE appliance (i5-9500, 16GB RAM). Managed via
    # arensb.truenas Ansible collection (SSHes in, runs midclt commands).
    # NOT a standard Linux host — common/hardening roles do NOT apply.
    # Apps: Plex, Immich, Linkwarden, Paperless-NGX, Portracker, PostgreSQL.
    truenas:
      hosts:
        truenas:
          ansible_host: 10.0.40.2
          ansible_user: truenas_admin
          ansible_port: 2222
          ansible_ssh_private_key_file: ~/.ssh/truenas_admin

    # ---------------------------------------------------------------------------
    # Proxmox Backup Server (lab-04, Management VLAN 10)
    # ---------------------------------------------------------------------------
    # PBS VM provisioned by Terraform Layer 05. Lives on Management VLAN 10
    # for direct access from all Proxmox nodes (no jump host needed).
    # PBS default user is root. SSH key is Terraform-generated.
    pbs_server:
      hosts:
        pbs:
          ansible_host: 10.0.10.15
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/pbs_ssh_key

    # ---------------------------------------------------------------------------
    # Backup Server (lab-01, Management VLAN 10)
    # ---------------------------------------------------------------------------
    # Restic REST server + Backrest monitoring UI. LXC on lab-01 with
    # bind-mounted hdd-mirror-0 ZFS pool. Centralized backup target for
    # all service hosts. No Docker — both Go binaries run as systemd.
    backup_server:
      hosts:
        backup:
          ansible_host: 10.0.10.18
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/backup_ssh_key
          container_vm_id: 5040

    # ---------------------------------------------------------------------------
    # Uptime Kuma Internal (lab-03, Management VLAN 10)
    # ---------------------------------------------------------------------------
    # Internal homelab monitoring. LXC on lab-03 at 10.0.10.19.
    # Monitors Vault cluster, Proxmox nodes, and all *.home.example-lab.org services.
    # Paired with public Uptime Kuma on Hetzner gateway (monitors *.example-lab.org).
    # Traefik proxies it at status.home.example-lab.org.
    uptime_kuma_internal:
      hosts:
        uptime-kuma-internal:
          ansible_host: 10.0.10.19
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/uptime-kuma-internal_ssh_key
          container_vm_id: 5041

    # ---------------------------------------------------------------------------
    # Gotify Internal (lab-03, Management VLAN 10)
    # ---------------------------------------------------------------------------
    # Internal push notification server. LXC on lab-03 at 10.0.10.20.
    # Receives alerts from uptime-kuma-internal, changedetection listing watcher,
    # and any other homelab service that needs push notifications.
    # Traefik proxies it at gotify.home.example-lab.org.
    # Paired with Hetzner Gotify (external: Alertmanager, public Uptime Kuma).
    gotify:
      hosts:
        gotify:
          ansible_host: 10.0.10.20
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/gotify_ssh_key
          container_vm_id: 5042

    # ---------------------------------------------------------------------------
    # Traefik Reverse Proxy (lab-04, Management VLAN 10)
    # ---------------------------------------------------------------------------
    # Standalone Traefik v3 LXC for TLS termination of all non-K8s services.
    # Lives on Management VLAN 10 for direct L2 access to management backends.
    # LXC uses root. SSH key is Terraform-generated.
    traefik_proxy:
      hosts:
        traefik-proxy:
          ansible_host: 10.0.10.17
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/traefik-proxy_ssh_key
          container_vm_id: 5033

    # ---------------------------------------------------------------------------
    # DMZ Services (lab-03, DMZ VLAN 30)
    # ---------------------------------------------------------------------------
    # LXC containers on DMZ VLAN 30 provisioned by Terraform Layer 05.
    # SSH keys are Terraform-generated: terraform/layers/05-standalone-services/.secrets/
    # WireGuard LXC runs as root (no admin user, minimal container).
    dmz_services:
      hosts:
        wireguard:
          ansible_host: 10.0.30.2
          ansible_user: root
          ansible_ssh_private_key_file: ~/repos/firblab/terraform/layers/05-standalone-services/.secrets/wireguard_ssh_key
          container_vm_id: 5020

    # ---------------------------------------------------------------------------
    # Hetzner Cloud
    # ---------------------------------------------------------------------------
    hetzner:
      hosts:
        lab-hetzner:
          ansible_host: 203.0.113.10
          ansible_user: root
          ansible_port: 2222  # Real SSH on 2222 — port 22 is reserved for honeypot
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-hetzner
          ansible_python_interpreter: /usr/bin/python3
        # Dedicated honeypot server — provisioned by Terraform Layer 06
        # IP from: terraform -chdir=terraform/layers/06-hetzner output honeypot_server_ip
        # Also stored in Vault: secret/infra/hetzner/server_ips (honeypot_ip)
        # honeypot-deploy.yml resolves live IP from Vault at runtime
        lab-honeypot:
          ansible_host: 203.0.113.11
          ansible_user: root
          ansible_port: 2222  # Real SSH on 2222 — port 22 is Cowrie honeypot
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519_lab-hetzner
          ansible_python_interpreter: /usr/bin/python3

    # ---------------------------------------------------------------------------
    # Logical groupings for playbook targeting
    # ---------------------------------------------------------------------------
    linux_vms:
      children:
        vault_cluster:
        core_infra:
        rke2_cluster:
        k3s_cluster:
        standalone_services:
        archive_appliance:
        dmz_services:
        pbs_server:
        traefik_proxy:
        backup_server:
        uptime_kuma_internal:
        gotify:

    # All Linux hosts that should run the PatchMon agent for patch monitoring.
    # Includes all groups except macOS hosts (vault-1). The agent deployment
    # playbook uses meta: end_host to skip Darwin hosts at runtime.
    # Agent communicates outbound-only to PatchMon server (10.0.20.15:3000).
    patchmon_agent_targets:
      children:
        proxmox_nodes:
        vault_cluster:
        core_infra:
        rke2_cluster:
        k3s_cluster:
        standalone_services:
        archive_appliance:
        dmz_services:
        rpi:
        pbs_server:
        traefik_proxy:
        backup_server:
        uptime_kuma_internal:
        gotify:
        hetzner:

    # UPS-protected hosts that need NUT client for coordinated shutdown.
    # These hosts are powered by the CyberPower UPS in the closet rack.
    # NUT server (lab-08) is NOT in this group — it runs as master.
    # Proxmox nodes use iptables (not UFW); outbound to lab-08:3493
    # is allowed by default. No firewall changes needed on clients.
    ups_clients:
      hosts:
        lab-01: {}     # Closet rack, Port 1 — main compute (RKE2 cluster)
        lab-04: {}     # Closet rack, Port 3 — lightweight compute (NetBox)

    management_vlan:
      children:
        proxmox_nodes:
        macmini:
        rpi:
        pbs_server:
        traefik_proxy:
        backup_server:
        uptime_kuma_internal:
        gotify:

    # Services VLAN 20 — all hosts reached via Proxmox jump host.
    # gw-01's inter-VLAN routing intermittently drops TCP to
    # newly-created VMs on this VLAN (ARP/conntrack issue). Proxmox
    # has direct L2 access via vmbr0 so SSH via jump is reliable.
    # Uses SSH -W (native stdio forwarding) — requires AllowTcpForwarding=yes
    # on the jump host (set in group_vars/proxmox_nodes.yml).
    services_vlan:
      vars:
        ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519_lab-01 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null admin@10.0.10.42"'
      children:
        rke2_cluster:
        k3s_cluster:
        standalone_services:
        archive_appliance:

    # DMZ VLAN 30 — reached via Proxmox jump host (lab-01).
    # Uses lab-01 (same as services_vlan) because it has confirmed
    # AllowTcpForwarding=yes and working inter-VLAN routing via gw-01.
    # Traffic path: workstation → lab-01 (VLAN 10) → gw-01 → VLAN 30.
    dmz_vlan:
      vars:
        ansible_ssh_common_args: '-o ProxyCommand="ssh -W %h:%p -i ~/.ssh/id_ed25519_lab-01 -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null admin@10.0.10.42"'
      children:
        dmz_services:

    # ---------------------------------------------------------------------------
    # OS Family Groups (for role dispatch — packages, firewall, MAC system)
    # ---------------------------------------------------------------------------
    # Hosts are assigned to these groups based on their OS family.
    # Roles use include_tasks with ansible_os_family to dispatch, but these
    # groups allow targeting by OS family in playbooks if needed.
    debian_hosts:
      hosts:
        vault-3: {}          # RPi5 — Ubuntu 24.04
        lab-08: {}       # RPi4 — Raspberry Pi OS Lite (Debian bookworm, VLAN 1)
        gitlab: {}           # Core infra — Ubuntu 24.04
        gitlab-runner: {}    # Core infra — Ubuntu 24.04
        authentik: {}        # Core infra — Ubuntu 24.04 (Management VLAN 10, lab-04)
        # wazuh: {}          # Removed — lab-02 RAM constraint
        ghost: {}            # LXC — Ubuntu 24.04 (Services VLAN 20)
        roundcube: {}        # LXC — Ubuntu 24.04 (Services VLAN 20)
        foundryvtt: {}       # VM — Ubuntu 24.04 (Services VLAN 20)
        mealie: {}           # LXC — Ubuntu 24.04 (Services VLAN 20)
        netbox: {}           # VM — Ubuntu 24.04 (Services VLAN 20, lab-04)
        patchmon: {}         # VM — Ubuntu 24.04 (Services VLAN 20, lab-04)
        actualbudget: {}     # LXC — Ubuntu 24.04 (Services VLAN 20, lab-03)
        changedetection: {}  # LXC — Ubuntu 24.04 (Services VLAN 20, lab-03)
        archive: {}          # Bare-metal ZimaBlade 7700 — Ubuntu 24.04 (Services VLAN 20)
        vaultwarden: {}      # LXC — Ubuntu 24.04 (Services VLAN 20, lab-03)
        freshrss: {}         # LXC — Ubuntu 24.04 (Services VLAN 20, lab-03)
        pbs: {}              # VM — Debian 13/PBS 4.x (Management VLAN 10, lab-04)
        traefik-proxy: {}    # LXC — Ubuntu 24.04 (Management VLAN 10, lab-04)
        backup: {}                    # LXC — Ubuntu 24.04 (Management VLAN 10, lab-01)
        uptime-kuma-internal: {}      # LXC — Ubuntu 24.04 (Management VLAN 10, lab-03)
        gotify: {}                    # LXC — Ubuntu 24.04 (Management VLAN 10, lab-03)
        wireguard: {}                 # LXC — Ubuntu 24.04 (DMZ VLAN 30)
        rke2-server-1: {}    # RKE2 VM — Ubuntu 24.04 (Services VLAN 20)
        rke2-server-2: {}    # RKE2 VM — Ubuntu 24.04 (Services VLAN 20)
        rke2-server-3: {}    # RKE2 VM — Ubuntu 24.04 (Services VLAN 20)
        rke2-agent-1: {}     # RKE2 VM — Ubuntu 24.04 (Services VLAN 20)
        rke2-agent-2: {}     # RKE2 VM — Ubuntu 24.04 (Services VLAN 20)
        sonarqube: {}        # VM — Ubuntu 24.04 (Services VLAN 20, lab-01)
        k3s-server-1: {}     # RPi5 8GB — Ubuntu 24.04 ARM64 (Services VLAN 20)
        k3s-server-2: {}     # RPi5 8GB — Ubuntu 24.04 ARM64 (Services VLAN 20)
        k3s-server-3: {}     # RPi5 4GB — Ubuntu 24.04 ARM64 (Services VLAN 20)

    redhat_hosts:
      hosts:
        vault-2: {}          # Proxmox VM — Rocky Linux 9

    darwin_hosts:
      hosts:
        vault-1: {}          # Mac Mini — macOS native Vault
