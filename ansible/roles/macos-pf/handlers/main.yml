---
- name: Reload pf rules
  ansible.builtin.command: pfctl -f /etc/pf.conf
  become: true
  changed_when: true

- name: Unload pf launch daemon
  ansible.builtin.command: launchctl bootout system/com.example-lab.pfctl
  become: true
  changed_when: true
  failed_when: false

- name: Load pf launch daemon
  ansible.builtin.command: launchctl bootstrap system /Library/LaunchDaemons/com.example-lab.pfctl.plist
  become: true
  changed_when: true
  failed_when: false
