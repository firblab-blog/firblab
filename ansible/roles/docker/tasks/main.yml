---
# =============================================================================
# Docker Role - Install and Configure Docker CE
# =============================================================================
# Installs Docker CE from the official Docker repository with multi-arch
# support (amd64/arm64), configures daemon logging, and sets up user access.
# =============================================================================

# ---------------------------------------------------------------------------
# Remove Old Docker Packages
# ---------------------------------------------------------------------------
- name: Remove legacy Docker packages
  ansible.builtin.apt:
    name:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
    purge: true
  tags:
    - install

# ---------------------------------------------------------------------------
# Prerequisites
# ---------------------------------------------------------------------------
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name: >-
      {{
        ['ca-certificates', 'curl', 'gnupg', 'lsb-release', 'apt-transport-https']
        + (['software-properties-common'] if ansible_distribution == 'Ubuntu' else [])
      }}
    state: present
    update_cache: true
  tags:
    - install

# ---------------------------------------------------------------------------
# Docker Repository Setup
# ---------------------------------------------------------------------------
- name: Determine system architecture for Docker repository
  ansible.builtin.set_fact:
    docker_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  tags:
    - install

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags:
    - install

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
    dest: /tmp/docker-gpg-key
    mode: "0644"
    force: true
  tags:
    - install

- name: Dearmor Docker GPG key into keyring
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker-gpg-key
  args:
    creates: /etc/apt/keyrings/docker.gpg
  tags:
    - install

- name: Set Docker keyring permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    mode: "0644"
  tags:
    - install

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker
    update_cache: true
  tags:
    - install

# ---------------------------------------------------------------------------
# Install Docker CE
# ---------------------------------------------------------------------------
- name: Install Docker CE packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
  tags:
    - install

# ---------------------------------------------------------------------------
# Docker Group and Users
# ---------------------------------------------------------------------------
- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  tags:
    - configure

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users | default([]) }}"
  tags:
    - configure

# ---------------------------------------------------------------------------
# Docker Daemon Configuration
# ---------------------------------------------------------------------------
- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - configure

- name: Template Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart docker
  tags:
    - configure

# ---------------------------------------------------------------------------
# Docker Directories
# ---------------------------------------------------------------------------
- name: Create Docker working directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: docker
    mode: "0755"
  loop:
    - /opt/docker
    - /opt/docker/compose
  tags:
    - configure
    - directories

# ---------------------------------------------------------------------------
# Enable and Start Services
# ---------------------------------------------------------------------------
- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
  tags:
    - service

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - service

# ---------------------------------------------------------------------------
# Verification
# ---------------------------------------------------------------------------
- name: Verify Docker is running
  ansible.builtin.command:
    cmd: docker info
  register: docker_info_result
  changed_when: false
  retries: 3
  delay: 5
  until: docker_info_result.rc == 0
  tags:
    - verify

- name: Display Docker version
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version_output
  changed_when: false
  tags:
    - verify

- name: Show installed Docker version
  ansible.builtin.debug:
    msg: "Installed: {{ docker_version_output.stdout }}"
  tags:
    - verify

# ---------------------------------------------------------------------------
# Cleanup
# ---------------------------------------------------------------------------
- name: Remove temporary GPG key file
  ansible.builtin.file:
    path: /tmp/docker-gpg-key
    state: absent
  tags:
    - install
    - cleanup
