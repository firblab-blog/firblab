---
# =============================================================================
# Docker Role Handlers
# =============================================================================

- name: Restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Reload docker
  ansible.builtin.systemd:
    name: docker
    state: reloaded

- name: Restart containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
