---
# =============================================================================
# proxmox-disks — LVM-Thin Pool Configuration
# =============================================================================
# Creates an LVM-thin pool on an SSD or NVMe disk and registers it as a
# Proxmox storage pool. Used for VM disk images and container rootfs.
#
# Expected variable: current_disk (dict from discover.yml)
#   { name: "/dev/sdb", pool_name: "ssd-thin-0", ... }
#
# LVM-thin is the default Proxmox storage layout for VM disks:
#   Physical Volume (PV) → Volume Group (VG) → Thin Pool (LV)
# Thin provisioning allows overcommitting disk space and supports snapshots.
#
# NOTE: All shell tasks export PATH to include /usr/sbin where Proxmox/LVM
# admin tools live. Ansible's become + shell may not inherit the login PATH.
# =============================================================================

# -------------------------------------------------------------------------
# Step 0: Verify the disk device exists and is accessible
# -------------------------------------------------------------------------
- name: "LVM-Thin | Verify {{ current_disk.name }} exists"
  ansible.builtin.stat:
    path: "{{ current_disk.name }}"
  register: disk_stat
  failed_when: not disk_stat.stat.exists
  tags: [proxmox-disks, lvmthin]

# -------------------------------------------------------------------------
# Step 1: Create LVM Physical Volume
# -------------------------------------------------------------------------
- name: "LVM-Thin | Check if {{ current_disk.name }} is already a PV"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      pvs {{ current_disk.name }}
    executable: /bin/bash
  register: pv_check
  changed_when: false
  failed_when: false
  tags: [proxmox-disks, lvmthin]

- name: "LVM-Thin | Create physical volume on {{ current_disk.name }}"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      pvcreate {{ current_disk.name }}
    executable: /bin/bash
  when: pv_check.rc != 0
  tags: [proxmox-disks, lvmthin]

# -------------------------------------------------------------------------
# Step 2: Create Volume Group
# -------------------------------------------------------------------------
- name: "LVM-Thin | Check if VG '{{ current_disk.pool_name }}' exists"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      vgs {{ current_disk.pool_name }}
    executable: /bin/bash
  register: vg_check
  changed_when: false
  failed_when: false
  tags: [proxmox-disks, lvmthin]

- name: "LVM-Thin | Create volume group '{{ current_disk.pool_name }}'"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      vgcreate {{ current_disk.pool_name }} {{ current_disk.name }}
    executable: /bin/bash
  when: vg_check.rc != 0
  tags: [proxmox-disks, lvmthin]

# -------------------------------------------------------------------------
# Step 3: Create Thin Pool
# -------------------------------------------------------------------------
- name: "LVM-Thin | Check if thin pool 'data' exists in VG '{{ current_disk.pool_name }}'"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      set -euo pipefail
      lvs --noheadings -o lv_name,lv_attr {{ current_disk.pool_name }} 2>/dev/null \
        | grep -qP '^\s+data\s+t' && echo "exists" || echo "absent"
    executable: /bin/bash
  register: tp_check
  changed_when: false
  tags: [proxmox-disks, lvmthin]

- name: "LVM-Thin | Create thin pool 'data' in VG '{{ current_disk.pool_name }}'"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      lvcreate -l 100%FREE -T {{ current_disk.pool_name }}/data
    executable: /bin/bash
  when: tp_check.stdout | trim == "absent"
  tags: [proxmox-disks, lvmthin]

# -------------------------------------------------------------------------
# Step 4: Register in Proxmox
# -------------------------------------------------------------------------
- name: "LVM-Thin | Check if Proxmox storage '{{ current_disk.pool_name }}' exists"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      set -euo pipefail
      pvesm status 2>/dev/null | grep -qP '^\s*{{ current_disk.pool_name }}\s' \
        && echo "exists" || echo "absent"
    executable: /bin/bash
  register: pvesm_check
  changed_when: false
  tags: [proxmox-disks, lvmthin]

- name: "LVM-Thin | Register '{{ current_disk.pool_name }}' as Proxmox storage"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      pvesm add lvmthin {{ current_disk.pool_name }} \
        --thinpool data \
        --vgname {{ current_disk.pool_name }} \
        --content {{ proxmox_lvmthin_content }} \
        --nodes {{ inventory_hostname }}
    executable: /bin/bash
  when: pvesm_check.stdout | trim == "absent"
  tags: [proxmox-disks, lvmthin]

# If the pool already exists (created by another node in a cluster), ensure
# this node is in the 'nodes' list so it can access its own local storage.
# This handles the case where two nodes have the same pool name (e.g.,
# hdd-data-0 on lab-01 AND lab-02 backed by different physical disks).
- name: "LVM-Thin | Ensure {{ inventory_hostname }} is in nodes list for '{{ current_disk.pool_name }}'"
  ansible.builtin.shell:
    cmd: |
      export PATH="/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      set -euo pipefail
      CURRENT_NODES=$(pvesh get /storage/{{ current_disk.pool_name }} --output-format json 2>/dev/null \
        | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('nodes',''))" 2>/dev/null || echo "")
      if [ -z "$CURRENT_NODES" ]; then
        # No nodes restriction set — add one for this node
        pvesm set {{ current_disk.pool_name }} --nodes {{ inventory_hostname }}
        echo "changed: set nodes to {{ inventory_hostname }}"
      elif echo "$CURRENT_NODES" | grep -q '{{ inventory_hostname }}'; then
        echo "ok: {{ inventory_hostname }} already in nodes list ($CURRENT_NODES)"
      else
        # Append this node to existing list
        pvesm set {{ current_disk.pool_name }} --nodes "${CURRENT_NODES},{{ inventory_hostname }}"
        echo "changed: added {{ inventory_hostname }} to nodes list (was: $CURRENT_NODES)"
      fi
    executable: /bin/bash
  register: nodes_update
  changed_when: "'changed:' in nodes_update.stdout"
  when: pvesm_check.stdout | trim == "exists"
  tags: [proxmox-disks, lvmthin]

- name: "LVM-Thin | Storage '{{ current_disk.pool_name }}' configured successfully"
  ansible.builtin.debug:
    msg: >-
      LVM-thin pool '{{ current_disk.pool_name }}' created on {{ current_disk.name }}
      ({{ current_disk.size_human }}, {{ current_disk.disk_type | upper }}).
      VG: {{ current_disk.pool_name }}, Thin pool: data
      Content types: {{ proxmox_lvmthin_content }}
  tags: [proxmox-disks, lvmthin]
