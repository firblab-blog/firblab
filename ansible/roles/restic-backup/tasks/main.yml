---
# =============================================================================
# restic-backup — Client Installation and Per-Service Backup Configuration
# =============================================================================
# Installs the Restic binary and deploys per-service backup wrapper scripts
# with cron jobs. Each service gets its own script that handles:
#   1. Stop service (Docker Compose or systemd)
#   2. Run pre-backup commands (database dumps)
#   3. Restic backup to REST server
#   4. Restart service
#   5. Run post-backup commands (cleanup)
#   6. Prune old snapshots (retention policy)
#   7. Integrity check (weekly)
#
# Skipped entirely when restic_backup_enabled is false.
# =============================================================================

- name: Validate Restic backup configuration
  ansible.builtin.assert:
    that:
      - restic_backup_services | length > 0
      - restic_repo_url is defined and restic_repo_url | length > 0
      - restic_repo_password is defined and restic_repo_password | length > 0
    fail_msg: >
      Restic backup role requires: restic_backup_services (non-empty),
      restic_repo_url, restic_repo_password.
      These should be set from Vault in the playbook pre_tasks.
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Install Restic Binary
# ---------------------------------------------------------------------------
- name: Check if Restic is already installed at correct version
  ansible.builtin.command:
    cmd: "{{ restic_binary }} version"
  register: restic_version_check
  changed_when: false
  failed_when: false
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

- name: Determine system architecture for Restic download
  ansible.builtin.set_fact:
    restic_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

- name: Download Restic binary
  ansible.builtin.get_url:
    url: "https://github.com/restic/restic/releases/download/v{{ restic_version }}/restic_{{ restic_version }}_linux_{{ restic_arch }}.bz2"
    dest: "/tmp/restic-{{ restic_version }}.bz2"
    mode: "0644"
  when:
    - restic_backup_enabled | default(false) | bool
    - restic_version_check.rc is not defined or restic_version_check.rc != 0 or restic_version not in (restic_version_check.stdout | default(''))
  tags:
    - restic-backup

- name: Install bzip2 for Restic binary extraction
  ansible.builtin.apt:
    name: bzip2
    state: present
    update_cache: true
  when:
    - restic_backup_enabled | default(false) | bool
    - restic_version_check.rc is not defined or restic_version_check.rc != 0 or restic_version not in (restic_version_check.stdout | default(''))
  tags:
    - restic-backup

- name: Extract Restic binary
  ansible.builtin.shell:
    cmd: "bunzip2 -f /tmp/restic-{{ restic_version }}.bz2 && mv /tmp/restic-{{ restic_version }} {{ restic_binary }} && chmod 755 {{ restic_binary }}"
  when:
    - restic_backup_enabled | default(false) | bool
    - restic_version_check.rc is not defined or restic_version_check.rc != 0 or restic_version not in (restic_version_check.stdout | default(''))
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Directories
# ---------------------------------------------------------------------------
- name: Create Restic backup script directory
  ansible.builtin.file:
    path: /opt/firblab/scripts
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

- name: Create Restic log directory
  ansible.builtin.file:
    path: /var/log
    state: directory
    mode: "0755"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Initialize Repository (if needed)
# ---------------------------------------------------------------------------
- name: Check if Restic repository is initialized
  ansible.builtin.command:
    cmd: "{{ restic_binary }} snapshots --no-lock"
  environment:
    RESTIC_REPOSITORY: "{{ restic_repo_url }}"
    RESTIC_PASSWORD: "{{ restic_repo_password }}"
  register: restic_repo_check
  changed_when: false
  failed_when: false
  no_log: true
  timeout: 30
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

- name: Initialize Restic repository
  ansible.builtin.command:
    cmd: "{{ restic_binary }} init"
  environment:
    RESTIC_REPOSITORY: "{{ restic_repo_url }}"
    RESTIC_PASSWORD: "{{ restic_repo_password }}"
  when:
    - restic_backup_enabled | default(false) | bool
    - restic_repo_check.rc is defined and restic_repo_check.rc != 0
  no_log: true
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Deploy Per-Service Backup Scripts
# ---------------------------------------------------------------------------
- name: Deploy Restic backup scripts for each service
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: "/opt/firblab/scripts/restic-backup-{{ item.name }}.sh"
    owner: root
    group: root
    mode: "0750"
  loop: "{{ restic_backup_services }}"
  loop_control:
    label: "{{ item.name }}"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Cron Jobs
# ---------------------------------------------------------------------------
- name: Create Restic backup cron jobs
  ansible.builtin.cron:
    name: "restic-backup-{{ item.name }}"
    minute: "{{ item.cron_minute | default('0') }}"
    hour: "{{ item.cron_hour | default('1') }}"
    job: "/opt/firblab/scripts/restic-backup-{{ item.name }}.sh >> /var/log/restic-backup-{{ item.name }}.log 2>&1"
    user: root
    state: present
  loop: "{{ restic_backup_services }}"
  loop_control:
    label: "{{ item.name }}"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

- name: Create Restic backup log files
  ansible.builtin.file:
    path: "/var/log/restic-backup-{{ item.name }}.log"
    state: touch
    owner: root
    group: root
    mode: "0640"
    modification_time: preserve
    access_time: preserve
  loop: "{{ restic_backup_services }}"
  loop_control:
    label: "{{ item.name }}"
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup

# ---------------------------------------------------------------------------
# Trigger First Backup
# ---------------------------------------------------------------------------
# Fire each backup script in the background immediately after deploy.
# Async + poll:0 = fire-and-forget (doesn't block the playbook).
# Output goes to the standard log file for each service.
- name: Trigger first backup run (background)
  ansible.builtin.shell:
    cmd: "/opt/firblab/scripts/restic-backup-{{ item.name }}.sh >> /var/log/restic-backup-{{ item.name }}.log 2>&1"
  loop: "{{ restic_backup_services }}"
  loop_control:
    label: "{{ item.name }}"
  async: 86400
  poll: 0
  when: restic_backup_enabled | default(false) | bool
  tags:
    - restic-backup
