---
# =============================================================================
# macOS SSH Hardening
# =============================================================================
# Deploys a hardened sshd_config for macOS hosts.
# Key-only authentication, restricted AllowUsers, no root login.
#
# Based on: lab-macmini/ansible/roles/mac.ssh
# =============================================================================

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: wheel
    mode: "0644"
    backup: true
    validate: /usr/sbin/sshd -t -f %s
  become: true
  notify:
    - Restart sshd
  tags:
    - ssh
    - security
