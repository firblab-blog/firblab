---
# =============================================================================
# hetzner-gateway Role — Default Variables
# =============================================================================
# Manages all Docker Compose services on the Hetzner gateway server.
# Config files are templated; secrets are injected from Vault via playbook.
#
# To upgrade a service: update the image tag below, then run gateway-deploy.yml.
# To add a Traefik route: edit templates/traefik-services.yml.j2, then run playbook.
# =============================================================================

# ---------------------------------------------------------------------------
# Pinned image versions
# ---------------------------------------------------------------------------
# Using pinned tags prevents Watchtower from silently deploying breaking changes.
# Update here when you want to upgrade — creates a deliberate, tracked change.
gateway_traefik_image: "traefik:v3.6.9"
gateway_adguard_image: "adguard/adguardhome:v0.107.69"
gateway_uptime_kuma_image: "louislam/uptime-kuma:2.1.3"
gateway_gotify_image: "gotify/server:2.9.0"
gateway_crowdsec_image: "crowdsecurity/crowdsec:v1.7.6"
gateway_fail2ban_image: "crazymax/fail2ban:1.1.0"
gateway_watchtower_image: "containrrr/watchtower:1.7.1"
# linuxserver/wireguard uses date-based tags — latest is stable and well-maintained
# Keep in sync with the bootstrap compose in user-data.sh.tpl (both use wireguard-data volume)
gateway_wireguard_image: "lscr.io/linuxserver/wireguard:latest"
gateway_node_exporter_image: "prom/node-exporter:v1.10.2"
gateway_alloy_image: "grafana/alloy:v1.13.2"

# ---------------------------------------------------------------------------
# WireGuard homelab peer (matches cloud-init user-data.sh.tpl defaults)
# ---------------------------------------------------------------------------
# The homelab peer is the WireGuard LXC (10.0.30.2) that connects back to
# the Hetzner gateway. These values are used by the wireguard-routes tasks to
# update the peer's AllowedIPs and manage the kernel routes.
gateway_wireguard_homelab_peer_name: "peer1"
gateway_wireguard_homelab_peer_ip: "10.8.0.2"

# ---------------------------------------------------------------------------
# Directory paths
# ---------------------------------------------------------------------------
gateway_base_dir: "/opt/firblab"
gateway_services_dir: "{{ gateway_base_dir }}/services"
gateway_traefik_dir: "{{ gateway_base_dir }}/traefik"
gateway_adguard_dir: "{{ gateway_base_dir }}/adguard"
gateway_wireguard_dir: "{{ gateway_base_dir }}/wireguard"
gateway_fail2ban_dir: "{{ gateway_base_dir }}/fail2ban"
gateway_alloy_dir: "{{ gateway_base_dir }}/alloy"
