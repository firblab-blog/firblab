---
# =============================================================================
# K3s Prerequisites
# =============================================================================
# Prepares nodes for K3s installation: kernel modules, sysctl, swap disabled,
# etcd user (CIS requirement). No Longhorn data disk — RPi5 NVMe IS the
# storage; K3s default local-path-provisioner handles PVCs.
# =============================================================================

# ---------------------------------------------------------------------------
# Disable Swap (Kubernetes requirement)
# ---------------------------------------------------------------------------
- name: Disable swap immediately
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: false
  tags:
    - prerequisites

- name: Remove swap entries from fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '\sswap\s'
    state: absent
    backup: true
  tags:
    - prerequisites

# ---------------------------------------------------------------------------
# Kernel Modules
# ---------------------------------------------------------------------------
- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop: "{{ k3s_kernel_modules }}"
  tags:
    - prerequisites
    - kernel

- name: Persist kernel modules across reboot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      # K3s required kernel modules — managed by Ansible
      {% for mod in k3s_kernel_modules %}
      {{ mod }}
      {% endfor %}
    owner: root
    group: root
    mode: "0644"
  tags:
    - prerequisites
    - kernel

# ---------------------------------------------------------------------------
# Sysctl (CIS prerequisites — required for protect-kernel-defaults: true)
# ---------------------------------------------------------------------------
- name: Set K3s CIS-required sysctl parameters
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/90-k3s-cis.conf
  loop: "{{ k3s_sysctl | dict2items }}"
  tags:
    - prerequisites
    - sysctl

# ---------------------------------------------------------------------------
# etcd User (CIS requirement for embedded etcd)
# ---------------------------------------------------------------------------
# K3s embedded etcd expects an 'etcd' user to own data files when
# protect-kernel-defaults is enabled. Must exist BEFORE K3s starts.
- name: Create etcd group
  ansible.builtin.group:
    name: etcd
    system: true
    state: present
  when: k3s_create_etcd_user | bool
  tags:
    - prerequisites

- name: Create etcd user
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/etcd
    create_home: false
    state: present
  when: k3s_create_etcd_user | bool
  tags:
    - prerequisites

# ---------------------------------------------------------------------------
# K3s Config Directory
# ---------------------------------------------------------------------------
- name: Create K3s config directory
  ansible.builtin.file:
    path: "{{ k3s_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - prerequisites
