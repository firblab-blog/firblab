---
# =============================================================================
# K3s Role Handlers
# =============================================================================

- name: Restart k3s
  ansible.builtin.systemd:
    name: k3s
    state: restarted
    daemon_reload: true
  when: k3s_role == "server"

- name: Restart k3s-agent
  ansible.builtin.systemd:
    name: k3s-agent
    state: restarted
    daemon_reload: true
  when: k3s_role == "agent"

- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true
