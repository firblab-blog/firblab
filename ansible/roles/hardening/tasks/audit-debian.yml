---
# =============================================================================
# Auditd Configuration — Debian/Ubuntu
# =============================================================================

- name: Remove default audit rules (conflicts with cis-l1.rules)
  ansible.builtin.file:
    path: /etc/audit/rules.d/audit.rules
    state: absent
  notify: Restart auditd
  tags:
    - audit
    - security

- name: Template auditd rules (Debian)
  ansible.builtin.template:
    src: auditd-rules-debian.j2
    dest: /etc/audit/rules.d/cis-l1.rules
    owner: root
    group: root
    mode: "0640"
    backup: true
  notify: Restart auditd
  tags:
    - audit
    - security

- name: Enable and start auditd service
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  tags:
    - audit
    - security
