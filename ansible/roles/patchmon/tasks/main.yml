---
# =============================================================================
# PatchMon Role - Patch Monitoring via Docker Compose
# =============================================================================
# Deploys PatchMon with PostgreSQL, Redis, backend, and frontend services
# using Docker Compose. Expects the docker role to be applied first.
#
# Stack: PostgreSQL 17 + Redis 7 + backend (Node.js) + frontend (nginx)
# =============================================================================

# ---------------------------------------------------------------------------
# Flush pending handlers from earlier roles (common, hardening, docker)
# ---------------------------------------------------------------------------
# Critical: the docker role's daemon.json template triggers a "Restart docker"
# handler. If this fires AFTER we start containers, it kills them all.
- name: Flush handlers from earlier roles before starting containers
  ansible.builtin.meta: flush_handlers

# ---------------------------------------------------------------------------
# Directories
# ---------------------------------------------------------------------------
- name: Create PatchMon directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode | default('0755') }}"
  loop:
    - path: "{{ patchmon_install_dir }}"
    - path: "{{ patchmon_install_dir }}/config"
      mode: "0750"
  tags:
    - configure
    - directories

# ---------------------------------------------------------------------------
# Configuration Files
# ---------------------------------------------------------------------------
- name: Template PatchMon environment file
  ansible.builtin.template:
    src: patchmon.env.j2
    dest: "{{ patchmon_install_dir }}/config/patchmon.env"
    owner: root
    group: root
    mode: "0600"
  register: env_changed
  notify: Restart patchmon
  tags:
    - configure

# ---------------------------------------------------------------------------
# Docker Compose
# ---------------------------------------------------------------------------
- name: Template PatchMon Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ patchmon_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
    backup: true
  register: compose_changed
  notify: Restart patchmon
  tags:
    - configure

# ---------------------------------------------------------------------------
# Pull and Start
# ---------------------------------------------------------------------------
- name: Pull PatchMon images
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ patchmon_install_dir }}"
  register: patchmon_pull_result
  changed_when: "'Pull complete' in patchmon_pull_result.stdout or 'Downloaded' in patchmon_pull_result.stderr"
  tags:
    - deploy

- name: Start PatchMon containers
  ansible.builtin.command:
    cmd: >-
      docker compose up -d
      {{ '--force-recreate' if (env_changed.changed | default(false) or compose_changed.changed | default(false)) else '' }}
    chdir: "{{ patchmon_install_dir }}"
  register: patchmon_up_result
  changed_when: "'Started' in patchmon_up_result.stderr or 'Creating' in patchmon_up_result.stderr or 'Recreat' in patchmon_up_result.stderr"
  tags:
    - deploy

# ---------------------------------------------------------------------------
# Health Check
# ---------------------------------------------------------------------------
- name: Wait for PatchMon frontend to be accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ patchmon_port }}"
    method: GET
    status_code: [200, 301, 302]
    follow_redirects: none
  register: patchmon_health
  retries: 30
  delay: 10
  until: patchmon_health.status is defined and patchmon_health.status in [200, 301, 302]
  failed_when: false
  tags:
    - verify

- name: Fail if PatchMon never became accessible
  ansible.builtin.fail:
    msg: "PatchMon failed to respond after 300 seconds. Last status: {{ patchmon_health.status | default('connection refused') }}"
  when: patchmon_health.status is not defined or patchmon_health.status not in [200, 301, 302]
  tags:
    - verify
