---
# =============================================================================
# Vaultwarden Role - Default Variables
# =============================================================================
# Override in playbook vars or group_vars as needed.
# =============================================================================

# Vaultwarden image — pinned for reproducibility
# https://github.com/dani-garcia/vaultwarden/releases
vaultwarden_image: "vaultwarden/server:1.35.3"

# Port exposed on the host (maps to container port 80)
vaultwarden_port: 8000

# Install directory
vaultwarden_install_dir: /opt/vaultwarden

# Domain for HTTPS access (used by Vaultwarden for OIDC redirects, web vault)
vaultwarden_domain: "https://vaultwarden.home.example-lab.org"

# Admin panel token — set via playbook vars (read from Vault) — do not hardcode.
vaultwarden_admin_token: ""

# Disable signups — this is a backup vault, not a public registration service.
vaultwarden_signups_allowed: "false"
vaultwarden_invitations_allowed: "false"
vaultwarden_show_password_hint: "false"

# OpenID Connect / SSO (Authentik)
# Set these via playbook vars (read from Vault) — do not hardcode secrets.
vaultwarden_sso_enabled: false
vaultwarden_sso_authority: ""
vaultwarden_sso_client_id: ""
vaultwarden_sso_client_secret: ""
