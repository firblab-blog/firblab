---
# =============================================================================
# Vaultwarden Role - Password Manager via Docker Compose
# =============================================================================
# Deploys Vaultwarden using Docker Compose in an LXC container. Expects the
# docker role to be applied first.
#
# Stack: Single container (vaultwarden/server), SQLite backend.
# Data is stored in a bind mount for easy backup.
# =============================================================================

# ---------------------------------------------------------------------------
# Directories
# ---------------------------------------------------------------------------
- name: Create Vaultwarden directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ vaultwarden_install_dir }}"
    - "{{ vaultwarden_install_dir }}/data"
  tags:
    - configure
    - directories

# ---------------------------------------------------------------------------
# Docker Compose
# ---------------------------------------------------------------------------
- name: Template Vaultwarden Docker Compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ vaultwarden_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: Restart vaultwarden
  tags:
    - configure

# ---------------------------------------------------------------------------
# Remove config.json — environment variables are the source of truth
# ---------------------------------------------------------------------------
# Vaultwarden's admin panel writes a config.json on save, which OVERRIDES all
# environment variables (including ADMIN_TOKEN). Since we manage config via
# Docker Compose env vars (templated by Ansible, secrets from Vault), any
# config.json is stale and must be removed before starting the container.
- name: Remove Vaultwarden config.json (env vars are source of truth)
  ansible.builtin.file:
    path: "{{ vaultwarden_install_dir }}/data/config.json"
    state: absent
  notify: Restart vaultwarden
  tags:
    - configure
    - deploy

# ---------------------------------------------------------------------------
# Pull and Start Containers
# ---------------------------------------------------------------------------
# Flush pending handlers (especially "Restart docker" from the docker role)
# BEFORE starting containers. Without this, Docker restarts AFTER containers
# are running, killing them.
- name: Flush handlers before starting Vaultwarden containers
  ansible.builtin.meta: flush_handlers

- name: Pull Vaultwarden container image
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ vaultwarden_install_dir }}"
  register: vaultwarden_pull_result
  changed_when: "'Pull complete' in vaultwarden_pull_result.stdout or 'Downloaded' in vaultwarden_pull_result.stderr"
  tags:
    - deploy

- name: Start Vaultwarden container
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ vaultwarden_install_dir }}"
  register: vaultwarden_up_result
  changed_when: "'Started' in vaultwarden_up_result.stderr or 'Creating' in vaultwarden_up_result.stderr"
  tags:
    - deploy

# ---------------------------------------------------------------------------
# Health Check
# ---------------------------------------------------------------------------
- name: Wait for Vaultwarden to be accessible
  ansible.builtin.uri:
    url: "http://localhost:{{ vaultwarden_port }}"
    method: GET
    status_code: [200, 301, 302]
    follow_redirects: none
  register: vaultwarden_health
  retries: 15
  delay: 10
  until: vaultwarden_health.status is defined and vaultwarden_health.status in [200, 301, 302]
  failed_when: false
  tags:
    - verify

- name: Fail if Vaultwarden never became accessible
  ansible.builtin.fail:
    msg: "Vaultwarden failed to respond after 150 seconds. Last status: {{ vaultwarden_health.status | default('connection refused') }}"
  when: vaultwarden_health.status is not defined or vaultwarden_health.status not in [200, 301, 302]
  tags:
    - verify
