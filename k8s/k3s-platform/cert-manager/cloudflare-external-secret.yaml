# ExternalSecret: Cloudflare API Token from Vault — K3s RPi5 cluster.
# Syncs Vault secret/infra/cloudflare -> K8s Secret cloudflare-api-token
# in the cert-manager namespace. Consumed by letsencrypt-dns ClusterIssuer.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: secret/infra/cloudflare
        property: api_token
