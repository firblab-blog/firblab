# ExternalSecret: Grafana admin credentials from Vault
# Syncs Vault path secret/k8s/grafana → K8s Secret grafana-admin-credentials
# in the monitoring namespace.
#
# Prerequisite: seed the secret in Vault:
#   vault kv put secret/k8s/grafana username=admin password=<your-password>
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/k8s/grafana
        property: username
    - secretKey: password
      remoteRef:
        key: secret/k8s/grafana
        property: password
