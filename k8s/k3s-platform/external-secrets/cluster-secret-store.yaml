# ClusterSecretStore for Vault — K3s RPi5 cluster.
# Uses auth/kubernetes-k3s/ backend (separate from RKE2's auth/kubernetes/).
#
# Prerequisites:
#   - External Secrets Operator installed in the cluster
#   - Vault kubernetes-k3s auth method enabled with external-secrets role
#   - k3s-vault-k8s-auth.yml playbook run (creates vault-ca Secret)
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://10.0.10.10:8200
      path: secret
      version: v2
      # Vault CA cert for TLS verification — created by k3s-vault-k8s-auth.yml
      caProvider:
        type: Secret
        name: vault-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes-k3s
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
