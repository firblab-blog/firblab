# NetworkPolicies — per-namespace zero-trust enforcement
# Wave 1: Applied after CNI (Canal) is running and platform namespaces exist.
# Deploys NetworkPolicies to all workload namespaces.
# Each manifest in the source path specifies its own metadata.namespace.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: http://10.0.10.50/infrastructure/firblab.git
    targetRevision: HEAD
    path: k8s/platform/network-policies/namespaces
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
