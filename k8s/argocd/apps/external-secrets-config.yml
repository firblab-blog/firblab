# External Secrets Config — ClusterSecretStore for Vault KV v2
# Wave 1: Applied after external-secrets controller is running (wave 0)
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: http://10.0.10.50/infrastructure/firblab.git
    targetRevision: HEAD
    path: k8s/platform/external-secrets
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
