# ArgoCD Image Updater — Automated container image tag updates
# Wave 0: Platform service (runs in argocd namespace alongside ArgoCD)
# Watches container registries for new image tags and commits updates
# to Git (write-back mode) so ArgoCD can sync them.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      chart: argocd-image-updater
      targetRevision: "0.*"
      helm:
        releaseName: argocd-image-updater
        valueFiles:
          - $values/k8s/platform/argocd-image-updater/helm/values.yaml
    - repoURL: http://10.0.10.50/infrastructure/firblab.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
