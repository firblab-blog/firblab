# ExternalSecret: GitLab CE initial root password from Vault
# Syncs Vault path secret/k8s/gitlab → K8s Secret gitlab-initial-root-password
# in the gitlab namespace.
#
# The GitLab Helm chart reads this secret on first install to set the root
# user password. Referenced by global.initialRootPassword in Helm values.
#
# Vault source: Terraform Layer 02-vault-config generates random_password.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-initial-root-password
  namespace: gitlab
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-initial-root-password
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: secret/k8s/gitlab
        property: root_password
