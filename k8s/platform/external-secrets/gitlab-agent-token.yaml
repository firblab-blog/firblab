# ExternalSecret: GitLab Agent token from Vault
# Syncs Vault path secret/k8s/gitlab-agent → K8s Secret gitlab-agent-token
# in the gitlab-agent namespace.
#
# The gitlab-agent Helm chart references this secret via config.secretName.
# The Secret key must be "token" — this is what the agent expects.
#
# Vault source: Terraform Layer 03-gitlab-config writes the agent registration
# token after creating the gitlab_cluster_agent_token resource.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitlab-agent-token
  namespace: gitlab-agent
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: gitlab-agent-token
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: secret/k8s/gitlab-agent
        property: token
