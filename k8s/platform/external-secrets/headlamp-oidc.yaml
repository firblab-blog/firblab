# ExternalSecret: Headlamp OIDC credentials from Vault
# Syncs Vault path secret/k8s/headlamp-oidc → K8s Secret headlamp-oidc
# in the headlamp namespace.
#
# The Headlamp Helm chart uses envFrom (externalSecret.enabled: true) to
# inject ALL secret keys as environment variables. Keys must be the exact
# env var names Headlamp expects: OIDC_CLIENT_ID, OIDC_CLIENT_SECRET, etc.
#
# Vault source: Terraform Layer 07-authentik-config writes client_id + client_secret.
# Static values (OIDC_ISSUER_URL, OIDC_SCOPES) are baked into the template
# so the secret is self-contained for envFrom injection.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headlamp-oidc
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: headlamp-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        OIDC_CLIENT_ID: "{{ .client_id }}"
        OIDC_CLIENT_SECRET: "{{ .client_secret }}"
        OIDC_ISSUER_URL: "https://auth.home.example-lab.org/application/o/headlamp/"
        OIDC_SCOPES: "openid profile email"
  data:
    - secretKey: client_id
      remoteRef:
        key: secret/k8s/headlamp-oidc
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: secret/k8s/headlamp-oidc
        property: client_secret
