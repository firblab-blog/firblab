# ClusterSecretStore for Vault - syncs secrets from Vault to Kubernetes.
# Used by ExternalSecret resources in application namespaces.
#
# Prerequisites:
#   - External Secrets Operator installed in the cluster
#   - Vault Kubernetes auth method enabled with external-secrets role
#   - vault-k8s-auth.yml playbook run (creates vault-ca Secret)
#
# Install ESO:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets --create-namespace
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: https://10.0.10.10:8200
      path: secret
      version: v2
      # Vault CA cert for TLS verification — created by vault-k8s-auth.yml
      caProvider:
        type: Secret
        name: vault-ca
        namespace: external-secrets
        key: ca.crt
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
