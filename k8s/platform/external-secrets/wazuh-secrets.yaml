# ExternalSecret: Wazuh SIEM credentials from Vault
# Syncs Vault path secret/k8s/wazuh → K8s Secret wazuh-credentials
# in the wazuh namespace.
#
# Keys:
#   api_password              — Wazuh Manager REST API admin password
#   agent_enrollment_password — authd password for agent registration
#
# Vault source: Terraform Layer 02-vault-config generates random_passwords.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: wazuh-credentials
  namespace: wazuh
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: wazuh-credentials
    creationPolicy: Owner
  data:
    - secretKey: api_password
      remoteRef:
        key: secret/k8s/wazuh
        property: api_password
    - secretKey: agent_enrollment_password
      remoteRef:
        key: secret/k8s/wazuh
        property: agent_enrollment_password
