# ExternalSecret: ArgoCD OIDC client secret → argocd-secret (v3.3.0 workaround)
#
# ArgoCD v3.3.0 bug: the $<secret-name>:<key> substitution syntax for separately
# labeled secrets (app.kubernetes.io/part-of: argocd) is broken — it reads the
# secret but fails to find the key in .data. The argocd-oidc secret exists and
# has the correct label and keys; ArgoCD just can't read them.
#
# Workaround: write oidc.clientSecret into argocd-secret itself using ESO's
# Merge creationPolicy. ArgoCD's $oidc.clientSecret substitution reads directly
# from argocd-secret (a separate code path that still works in v3.3.0).
#
# Source Vault path: secret/k8s/argocd-oidc (same as argocd-oidc.yaml)
# Remove this file if/when the $secret:key bug is fixed upstream.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-secret-oidc
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-secret
    creationPolicy: Merge     # Don't recreate argocd-secret — just add the key
    deletionPolicy: Retain    # Never delete argocd-secret; it holds admin creds
  data:
    - secretKey: oidc.clientSecret
      remoteRef:
        key: secret/k8s/argocd-oidc
        property: client_secret
