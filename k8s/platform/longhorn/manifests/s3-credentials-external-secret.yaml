# ExternalSecret: Longhorn S3 backup credentials from Vault
# Syncs Vault path secret/k8s/longhorn-s3 → K8s Secret longhorn-s3-credentials
# in the longhorn-system namespace.
#
# Longhorn expects the Secret keys to be: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_ENDPOINTS
# See: https://longhorn.io/docs/latest/snapshots-and-backups/backup-and-restore/set-backup-target/#set-up-aws-s3-backups
#
# Prerequisite: seed the secret in Vault:
#   vault kv put secret/k8s/longhorn-s3 \
#     AWS_ACCESS_KEY_ID=<hetzner-s3-access-key> \
#     AWS_SECRET_ACCESS_KEY=<hetzner-s3-secret-key> \
#     AWS_ENDPOINTS=https://region2.your-objectstorage.com
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: longhorn-s3-credentials
  namespace: longhorn-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: longhorn-s3-credentials
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: secret/k8s/longhorn-s3
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: secret/k8s/longhorn-s3
        property: AWS_SECRET_ACCESS_KEY
    - secretKey: AWS_ENDPOINTS
      remoteRef:
        key: secret/k8s/longhorn-s3
        property: AWS_ENDPOINTS
