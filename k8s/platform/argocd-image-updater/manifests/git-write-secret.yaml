# =============================================================================
# ExternalSecret: ArgoCD Image Updater Git Write-Back Credentials
# =============================================================================
# Syncs the image updater deploy token from Vault so the controller can
# commit image tag updates back to the Git repo.
#
# Vault path: secret/services/gitlab/image-updater
# Keys: username, token
# Created by: Terraform Layer 03-gitlab-config
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-image-updater-git-creds
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: argocd-image-updater-git-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd-image-updater
  data:
    - secretKey: username
      remoteRef:
        key: secret/services/gitlab/image-updater
        property: username
    - secretKey: password
      remoteRef:
        key: secret/services/gitlab/image-updater
        property: token
