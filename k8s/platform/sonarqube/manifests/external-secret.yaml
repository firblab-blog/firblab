# =============================================================================
# ExternalSecrets — SonarQube
# =============================================================================
# Syncs secrets from Vault KV v2 → two K8s Secrets in the sonarqube namespace.
#
# Vault prerequisite (created by Terraform Layer 03 apply):
#   vault kv get secret/services/sonarqube
#   Expected keys:
#     admin_password         - new admin password (random, generated by Terraform)
#     admin_password_current - current admin password ("admin" on fresh install)
#     monitoring_passcode    - passcode for /api/monitoring/metrics endpoint (chart 2025.x required)
#     gitlab_oauth_client_id - OAuth application_id from gitlab_application.sonarqube
#     gitlab_oauth_client_secret - OAuth secret from gitlab_application.sonarqube
#
# Consumers:
#   sonarqube-admin  → values.yaml account.existingSecret + monitoringPasscodeSecretName
#   sonarqube-oauth  → values.yaml extraEnvVars (env var override of sonar.properties)
# =============================================================================

# --- Admin password secret ---------------------------------------------------
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-admin
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sonarqube-admin
    creationPolicy: Owner
  data:
    # New admin password set by SonarQube chart init job
    - secretKey: password
      remoteRef:
        key: secret/services/sonarqube
        property: admin_password
    # Current admin password (default 'admin' on fresh install)
    - secretKey: currentPassword
      remoteRef:
        key: secret/services/sonarqube
        property: admin_password_current
    # Monitoring endpoint passcode (required by chart 2025.x validation)
    - secretKey: monitoring-passcode
      remoteRef:
        key: secret/services/sonarqube
        property: monitoring_passcode

# --- GitLab OAuth credentials (injected as env vars) ------------------------
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sonarqube-oauth
  namespace: sonarqube
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: sonarqube-oauth
    creationPolicy: Owner
  data:
    # SonarQube maps SONAR_AUTH_GITLAB_APPLICATIONID → sonar.auth.gitlab.applicationId
    - secretKey: SONAR_AUTH_GITLAB_APPLICATIONID
      remoteRef:
        key: secret/services/sonarqube
        property: gitlab_oauth_client_id
    # SonarQube maps SONAR_AUTH_GITLAB_SECRET → sonar.auth.gitlab.secret
    - secretKey: SONAR_AUTH_GITLAB_SECRET
      remoteRef:
        key: secret/services/sonarqube
        property: gitlab_oauth_client_secret
