# =============================================================================
# Default Deny All — Network Policy Template
# =============================================================================
# CIS 5.3.1: Ensure NetworkPolicy is configured for each namespace.
# Apply this to every workload namespace to establish zero-trust networking.
# Then add specific allow policies for required traffic.
#
# Usage: Copy this file and set metadata.namespace for each namespace.
# =============================================================================
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  # Set namespace when applying: kubectl apply -n <namespace> -f default-deny-all.yaml
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
