# =============================================================================
# NetworkPolicies — headlamp namespace
# =============================================================================
# Headlamp needs:
#   Ingress: Traefik (UI), Prometheus (metrics)
#   Egress: DNS, K8s API (cluster viewer), Authentik (OIDC)
# =============================================================================

# --- Default deny -----------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Egress

# --- Ingress from Traefik ---------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-traefik-ingress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik

# --- Ingress from Prometheus ------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

# --- Egress: DNS ------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# --- Egress: K8s API (cluster-viewer reads) ---------------------------------
# Canal DNAT: kube-proxy rewrites ClusterIP (10.43.0.1:443) to node IP:6443
# before Calico filter rules fire. Target the node CIDR + real port.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-egress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.20.0/24   # RKE2 node CIDR (post-DNAT destination)
      ports:
        - port: 6443                  # kube-apiserver port (post-DNAT)

# --- Egress: Authentik (OIDC via Traefik proxy) -----------------------------
# OIDC issuer (auth.home.example-lab.org) resolves to standalone Traefik proxy
# (10.0.10.17), which forwards to Authentik (10.0.10.16:9000).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-egress
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.10.16/32
        - ipBlock:
            cidr: 10.0.10.17/32
      ports:
        - port: 443
        - port: 9000
        - port: 9443
