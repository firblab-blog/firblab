# =============================================================================
# NetworkPolicies — external-secrets namespace
# =============================================================================
# ESO needs:
#   Ingress: Prometheus (metrics), webhook admission (from API server)
#   Egress: DNS, K8s API (for Secret writes), Vault (8200)
# =============================================================================

# --- Default deny -----------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress

# --- Ingress from Prometheus ------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

# --- Ingress: K8s API server webhook calls (ValidatingWebhookConfiguration) -
# ESO has admission webhooks; API server calls back to the ESO pods.
# kube-apiserver runs with hostNetwork: true on server nodes (10.0.20.x),
# but its webhook calls go through kube-proxy DNAT (ClusterIP → pod IP) with
# MASQUERADE applied. The webhook pod sees source = the sending node's
# flannel.1 IP (10.42.x.0), NOT the physical node IP (10.0.20.x).
# Confirmed via tcpdump on the Loki NodePort (same MASQUERADE mechanism).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-webhook-ingress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.42.0.0/16   # Flannel pod CIDR: kube-proxy MASQUERADE source

# --- Egress: DNS ------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# --- Egress: K8s API --------------------------------------------------------
# Canal DNAT: kube-proxy rewrites ClusterIP (10.43.0.1:443) to node IP:6443
# before Calico filter rules fire. Target the node CIDR + real port.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.20.0/24   # RKE2 node CIDR (post-DNAT destination)
      ports:
        - port: 6443                  # kube-apiserver port (post-DNAT)

# --- Egress: Vault ----------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vault-egress
  namespace: external-secrets
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.10.10/32
      ports:
        - port: 8200
