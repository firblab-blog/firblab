# =============================================================================
# NetworkPolicies — traefik namespace
# =============================================================================
# Traefik is the ingress controller — it routes traffic TO all backends.
# Ingress: external clients (80/443) + Prometheus scrape
# Egress: DNS + all namespaces (backend routing) + Authentik (ForwardAuth)
#
# Egress to all namespaces is intentional — Traefik routes requests to any
# backend service in the cluster. Restricting by namespace would require
# updating this policy for every new service deployed.
# =============================================================================

# --- Default deny -----------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Egress

# --- Ingress: external clients (HTTP + HTTPS) --------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8000   # maps to exposedPort 80
        - port: 8443   # maps to exposedPort 443

# --- Ingress from Prometheus ------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

# --- Egress: DNS ------------------------------------------------------------
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

# --- Egress: all in-cluster backends ----------------------------------------
# Traefik routes ingress traffic to any service in any namespace.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-egress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}

# --- Egress: K8s API --------------------------------------------------------
# Canal DNAT: kube-proxy rewrites ClusterIP (10.43.0.1:443) to node IP:6443
# before Calico filter rules fire. Target the node CIDR + real port.
# allow-backend-egress (namespaceSelector) cannot match this post-DNAT ipBlock.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-k8s-api-egress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.20.0/24   # RKE2 node CIDR (post-DNAT destination)
      ports:
        - port: 6443                  # kube-apiserver port (post-DNAT)

# --- Egress: Authentik ForwardAuth ------------------------------------------
# ForwardAuth middleware calls Authentik outpost for protected services.
# Authentik direct (10.0.10.16:9000) + Traefik proxy (10.0.10.17:443).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-egress
  namespace: traefik
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.0.10.16/32
        - ipBlock:
            cidr: 10.0.10.17/32
      ports:
        - port: 9000
        - port: 443
        - port: 9443
