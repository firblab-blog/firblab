# ClusterIssuer for Vault PKI - issues internal TLS certificates
# via the Vault intermediate CA.
#
# Prerequisites:
#   - cert-manager installed in the cluster
#   - Vault PKI secrets engine configured with intermediate CA
#   - Kubernetes auth method enabled in Vault with cert-manager role
#   - vault-k8s-auth.yml playbook run (creates vault-ca Secret)
#
# Install cert-manager:
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager -n cert-manager \
#     --create-namespace --set crds.enabled=true
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: vault-issuer
spec:
  vault:
    server: https://10.0.10.10:8200
    path: pki_int/sign/firblab
    # Vault CA cert for TLS verification — created by vault-k8s-auth.yml
    # in the Cluster Resource Namespace (cert-manager)
    caBundleSecretRef:
      name: vault-ca
      key: ca.crt
    auth:
      kubernetes:
        role: cert-manager
        mountPath: /v1/auth/kubernetes
        serviceAccountRef:
          name: cert-manager
