# =============================================================================
# ExternalSecret: Cloudflare API Token from Vault
# =============================================================================
# Syncs Vault path secret/infra/cloudflare → K8s Secret cloudflare-api-token
# in the cert-manager namespace. Consumed by the letsencrypt-dns ClusterIssuer
# for DNS-01 challenge validation.
#
# Prerequisite: Cloudflare API token seeded in Vault by Layer 02-vault-config.
# The token must have Zone:DNS:Edit permission for the example-lab.org zone.
# =============================================================================
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: secret/infra/cloudflare
        property: api_token
