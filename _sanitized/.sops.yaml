# =============================================================================
# SOPS Configuration for firblab
# =============================================================================
# SOPS + age encrypts sensitive files so they CAN be safely committed to Git.
# Without SOPS, these files are kept out of Git entirely via .gitignore.
#
# How it works:
#   1. Plaintext files (*.tfvars, *.tfstate) are excluded by .gitignore
#   2. To commit an encrypted copy, run:
#        sops --encrypt terraform/environments/network.tfvars \
#          > terraform/environments/network.sops.tfvars
#   3. The *.sops.* pattern is allowed through .gitignore
#   4. On another machine, decrypt with:
#        sops --decrypt network.sops.tfvars > network.tfvars
#
# Setup:
#   age-keygen -o ~/.config/sops/age/keys.txt
#   # Put the public key below. Store the private key securely
#   # (password manager, printed QR — NOT in this repo).
# =============================================================================

creation_rules:
  # Terraform variable files (contain credentials)
  - path_regex: \.tfvars$
    age: >-
      age1examplekey000000000000000000000000000000000000000000000000

  # Terraform state files (may contain sensitive provider data)
  - path_regex: \.tfstate$
    age: >-
      age1examplekey000000000000000000000000000000000000000000000000

  # Ansible vault files
  - path_regex: vault\.yml$
    age: >-
      age1examplekey000000000000000000000000000000000000000000000000

  # Environment files
  - path_regex: \.env$
    age: >-
      age1examplekey000000000000000000000000000000000000000000000000
