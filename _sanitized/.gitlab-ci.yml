# =============================================================================
# firblab - Root GitLab CI/CD Pipeline
# =============================================================================
# Orchestrates validation, scanning, planning, visualization, and deployment
# across all Terraform layers, Ansible playbooks, and Kubernetes manifests.
#
# Pipeline structure:
#   - validate:  Format checks, syntax checks, linting, D2 diagram rendering
#   - scan:      Security scanning (tfsec, trivy, ansible-lint)
#   - plan:      Terraform plan for changed layers
#   - visualize: Rover interactive Terraform plan visualization
#   - apply:     Terraform apply (manual gate, main branch only)
#   - configure: Ansible playbook execution (manual gate)
#   - deploy:    Ansible auto-deploy (Renovate version bumps + role changes)
#
# Jobs are triggered only when relevant files change.
# =============================================================================

stages:
  - validate
  - scan
  - plan
  - visualize
  - apply
  - configure
  - deploy
  - publish

include:
  - local: ci-templates/terraform-ci.yml
  - local: ci-templates/ansible-ci.yml
  - local: ci-templates/ansible-deploy-ci.yml
  - local: ci-templates/kubernetes-ci.yml
  - local: ci-templates/rover-ci.yml
  - local: ci-templates/d2-ci.yml
  - local: ci-templates/wiki-ci.yml
  - local: ci-templates/service-directory-ci.yml
  - local: ci-templates/renovate-ci.yml
  - local: ci-templates/sanitize-ci.yml

# =============================================================================
# Vault AppRole Integration Test
# =============================================================================
# Verifies the full auth chain: instance CI/CD variables → Vault CA cert →
# AppRole login → token with gitlab-ci policy → secret read access.
# Runs on every MR + main branch push to catch auth breakage early.
# =============================================================================

vault:test-approle:
  stage: validate
  image: alpine:latest
  tags: [docker]
  script:
    - |
      set -e
      apk add --no-cache -q curl jq
      echo "--- Vault AppRole Login ---"
      RESPONSE=$(curl -sf --cacert "$VAULT_CACERT" \
        -X POST -H "Content-Type: application/json" \
        -d "{\"role_id\":\"$VAULT_ROLE_ID\",\"secret_id\":\"$VAULT_SECRET_ID\"}" \
        "$VAULT_ADDR/v1/auth/approle/login")
      VAULT_TOKEN=$(echo "$RESPONSE" | jq -r '.auth.client_token')
      TOKEN_TTL=$(echo "$RESPONSE" | jq -r '.auth.lease_duration')
      TOKEN_POLICIES=$(echo "$RESPONSE" | jq -r '.auth.policies | join(", ")')
      echo "Token acquired (TTL=${TOKEN_TTL}s, policies=${TOKEN_POLICIES})"
      echo "--- Verify Policy Access ---"
      curl -sf --cacert "$VAULT_CACERT" \
        -H "X-Vault-Token: $VAULT_TOKEN" \
        "$VAULT_ADDR/v1/secret/metadata?list=true" > /dev/null
      echo "secret/metadata list: OK"
      echo "--- AppRole auth verified successfully ---"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# =============================================================================
# D2 Architecture Diagrams
# =============================================================================

d2:render-diagrams:
  extends: .d2-render
  variables:
    D2_SRC: docs/diagrams
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - docs/diagrams/**/*.d2
        - scripts/netbox-to-d2.py
        - ci-templates/d2-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/diagrams/**/*.d2
        - scripts/netbox-to-d2.py
        - ci-templates/d2-ci.yml

# =============================================================================
# Service Directory — Auto-Generated Emergency Reference
# =============================================================================
# Regenerates the service directory (Markdown, YAML, HTML) from IaC source
# files when Traefik backends, inventory, or DNS records change.
# Outputs are picked up by wiki:publish-docs as artifacts.
# =============================================================================

service-directory:generate:
  extends: .service-directory-generate
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ansible/roles/traefik-standalone/defaults/main.yml
        - ansible/inventory/hosts.yml
        - terraform/layers/00-network/dns.tf
        - scripts/generate-service-directory.py
        - ci-templates/service-directory-ci.yml

# =============================================================================
# Wiki Publishing — Docs + Rendered Diagrams + Service Directory
# =============================================================================
# Syncs docs/ directory, rendered D2 SVGs, and generated service directory
# to the GitLab project wiki.
# Runs on main branch only (not MRs) when docs or diagrams change.
# Depends on d2:render-diagrams and service-directory:generate for artifacts
# (both optional — publishes docs even if neither ran in this pipeline).
# =============================================================================

wiki:publish-docs:
  extends: .wiki-publish
  stage: publish
  needs:
    - job: d2:render-diagrams
      artifacts: true
      optional: true
    - job: service-directory:generate
      artifacts: true
      optional: true
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - docs/**/*
        - scripts/netbox-to-d2.py
        - ci-templates/d2-ci.yml
        - ci-templates/wiki-ci.yml
        - scripts/generate-service-directory.py
        - ci-templates/service-directory-ci.yml
        - ansible/roles/traefik-standalone/defaults/main.yml
        - ansible/inventory/hosts.yml
        - terraform/layers/00-network/dns.tf

