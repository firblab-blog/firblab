      changes:
        - ansible/**/*
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - ansible/**/*

ansible:lint:
  extends: .ansible-lint
  variables:
    PLAYBOOK: ansible/playbooks/ ansible/roles/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/**/*

# =============================================================================
# Renovate Coverage Lint
# =============================================================================
# Validates that every *_image and *_version variable in Ansible role defaults
# and inventory group_vars has Renovate Bot coverage. Catches missing
# annotations and malformed image:tag variables before they reach main.
# =============================================================================

ansible:renovate-coverage:
  stage: validate
  image: alpine:latest
  tags: [docker]
  script:
    - apk add --no-cache -q bash
    - bash scripts/renovate-coverage-lint.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - ansible/roles/*/defaults/main.yml
        - ansible/inventory/group_vars/*.yml
        - renovate.json5
        - scripts/renovate-coverage-lint.sh

