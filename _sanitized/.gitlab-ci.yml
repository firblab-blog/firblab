# =============================================================================
# Renovate Bot — Automated Dependency Updates
# =============================================================================
# Scans the monorepo for outdated Helm charts, Terraform providers, Ansible
# collections, and CI base images. Creates MRs with version bumps.
# Triggered by a scheduled pipeline (managed by Layer 03 Terraform).
# Container image updates are handled by ArgoCD Image Updater instead.
# =============================================================================

renovate:update-check:
  extends: .renovate-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RENOVATE_RUN == "true"

# =============================================================================
# Public Repo Sanitization — firblab → firblab-public
# =============================================================================
# Runs the sanitization pipeline and pushes sanitized content to the
# firblab-public repo on every push to main. The GitLab push mirror
# then syncs firblab-public to GitHub automatically.
# =============================================================================

sanitize:publish:
  extends: .sanitize-publish
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
