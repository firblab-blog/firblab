[defaults]
inventory = ansible/inventory/hosts.yml
roles_path = ansible/roles
remote_user = admin
# SSH keys are set per-host in inventory (ansible_ssh_private_key_file).
# No global private_key_file — each host has a dedicated key.
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
command_timeout = 1800
timeout = 30
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts_cache
fact_caching_timeout = 3600

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

[ssh_connection]
# StrictHostKeyChecking=no: Lab environment where LXC/VMs are frequently
# destroyed and recreated with new host keys on the same IPs. accept-new
# rejects changed keys, causing SSH hangs after destroy/recreate cycles.
# host_key_checking=False in [defaults] sets the same intent but ssh_args
# overrides it — so this must also be "no" to match.
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o IdentitiesOnly=yes
pipelining = True
control_path_dir = ~/.ansible/cp
control_path = %(directory)s/%%h-%%r

[persistent_connection]
connect_timeout = 30
command_timeout = 30
